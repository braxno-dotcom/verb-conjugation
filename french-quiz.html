<script>
// ===================== DATA =====================

// ---- Topic 1: Articles & Gender ----
const nouns = [
  // [word, gender m/f, startsWithVowelOrH]
  ["chat","m",false],["chien","m",false],["maison","f",false],["voiture","f",false],
  ["livre","m",false],["table","f",false],["fenêtre","f",false],["école","f",true],
  ["hôpital","m",true],["jardin","m",false],["fleur","f",false],["arbre","m",true],
  ["soleil","m",false],["lune","f",false],["mer","f",false],["montagne","f",false],
  ["ville","f",false],["pays","m",false],["temps","m",false],["travail","m",false],
  ["pain","m",false],["fromage","m",false],["vin","m",false],["café","m",false],
  ["thé","m",false],["lait","m",false],["beurre","m",false],["sucre","m",false],
  ["sel","m",false],["viande","f",false],["poisson","m",false],["légume","m",false],
  ["fruit","m",false],["problème","m",false],["main","f",false],["eau","f",true],
  ["homme","m",true],["musée","m",false],["plage","f",false],["idée","f",true],
  ["oiseau","m",true],["avion","m",true],["université","f",true],["histoire","f",true],
  ["image","f",true],["erreur","f",true],["air","m",true],["amour","m",true],
  ["âge","m",true],["été","m",true],["automne","m",true],["hiver","m",true],
  ["enfant","m",true],["ami","m",true],["amie","f",true],["orange","f",true],
  ["église","f",true],["île","f",true],["heure","f",true],["habitude","f",true],
  ["appartement","m",true],["étage","m",true],["animal","m",true],
  ["chose","f",false],["place","f",false],["nuit","f",false],["jour","m",false],
  ["soir","m",false],["matin","m",false],["rue","f",false],["pont","m",false],
  ["porte","f",false],["clé","f",false],["mot","m",false],["phrase","f",false],
  ["langue","f",false],["musique","f",false],["chanson","f",false],["film","m",false],
  ["théâtre","m",false],["cinéma","m",false],["restaurant","m",false],
  ["gare","f",false],["train","m",false],["bus","m",false],["métro","m",false],
  ["vélo","m",false],["pied","m",false],["tête","f",false],["corps","m",false],
  ["cœur","m",false],["sang","m",false],["monde","m",false],["terre","f",false],
  ["ciel","m",false],["pluie","f",false],["neige","f",false],["vent","m",false],
  ["feu","m",false],["pierre","f",false],["bois","m",false],["rivière","f",false],
  ["fleuve","m",false],["lac","m",false],["forêt","f",false],["campagne","f",false],
  ["champ","m",false],["route","f",false],["chemin","m",false],
  ["roi","m",false],["reine","f",false],["peuple","m",false],["guerre","f",false],
  ["paix","f",false],["loi","f",false],["droit","m",false],
  ["courage","m",false],["peur","f",false],["joie","f",false],["tristesse","f",false],
  ["bonheur","m",false],["malheur","m",false],["exemple","m",true],
  ["exercice","m",true],["espace","m",true],["étoile","f",true],
  ["entrée","f",true],["escalier","m",true],["argent","m",true],
];

// Tricky noun explanations
const nounExplanations = {
  "problème": "мужской род, несмотря на окончание -e",
  "musée": "мужской род, несмотря на окончание -ée",
  "lycée": "мужской род, несмотря на окончание -ée",
  "main": "женский род — одно из немногих слов на -ain женского рода",
  "eau": "женский род, начинается на гласную → l'eau",
  "homme": "мужской род, h muet → l'homme",
  "image": "женский род, начинается на гласную → l'image",
  "automne": "мужской род, несмотря на окончание -e",
  "courage": "мужской род, несмотря на окончание -e",
  "silence": "мужской род, несмотря на окончание -e",
  "exemple": "мужской род, несмотря на окончание -e",
  "exercice": "мужской род, несмотря на окончание -e",
  "espace": "мужской род, несмотря на окончание -e",
  "monde": "мужской род, несмотря на окончание -e",
  "peuple": "мужской род, несмотря на окончание -e",
  "fleuve": "мужской род, несмотря на окончание -e",
};

function makeArticleQuestions() {
  const qs = [];
  for (const [word, g, vowel] of nouns) {
    const defArt = vowel ? "l'" : (g === "m" ? "le" : "la");
    const partArt = vowel ? "de l'" : (g === "m" ? "du" : "de la");
    const contrArt = vowel ? "à l'" : (g === "m" ? "au" : "à la");
    const genderRu = g === "m" ? "Мужской" : "Женский";
    const explain = nounExplanations[word] || (g === "m" ? "мужской род" : "женский род");

    // Definite article question
    qs.push({
      type: "Какой артикль?",
      sentence: `___ ${word}`,
      hint: "Определённый артикль",
      options: vowel ? ["le","la","l'"] : ["le","la","l'"],
      correct: defArt,
      explanation: `${defArt}${vowel ? "" : " "}${word} — ${explain}`
    });

    // Partitive article
    qs.push({
      type: "Партитивный артикль",
      sentence: `Je veux ___ ${word}`,
      hint: "Частичный артикль (du / de la / de l')",
      options: ["du","de la","de l'"],
      correct: partArt,
      explanation: `${partArt}${vowel ? "" : " "}${word} — ${explain}`
    });

    // Contraction with à
    qs.push({
      type: "Стягивание с à",
      sentence: `Je vais ___ ${word}`,
      hint: "à + артикль",
      options: ["au","à la","à l'"],
      correct: contrArt,
      explanation: `${contrArt}${vowel ? "" : " "}${word} — ${explain}`
    });

    // Gender question
    qs.push({
      type: "Какой род?",
      sentence: word,
      hint: "Определите род существительного",
      options: ["Мужской","Женский"],
      correct: genderRu,
      explanation: `${word} — ${explain}`
    });
  }
  return qs;
}

// ---- Topic 2: Pronouns ----
const pronounQuestions = [
  // COD replacement
  {type:"Замените дополнение",sentence:"Je vois [Marie] tous les jours",hint:"COD — кого?",options:["le","la","les","lui"],correct:"la",explanation:"Marie → la (COD fem. sg.) → Je la vois tous les jours"},
  {type:"Замените дополнение",sentence:"Il mange [les pommes]",hint:"COD — что?",options:["le","la","les","lui"],correct:"les",explanation:"les pommes → les (COD pl.) → Il les mange"},
  {type:"Замените дополнение",sentence:"Tu connais [Pierre]?",hint:"COD — кого?",options:["le","la","les","lui"],correct:"le",explanation:"Pierre → le (COD masc. sg.) → Tu le connais?"},
  {type:"Замените дополнение",sentence:"Elle regarde [le film]",hint:"COD — что?",options:["le","la","les","en"],correct:"le",explanation:"le film → le (COD masc. sg.) → Elle le regarde"},
  {type:"Замените дополнение",sentence:"Nous écoutons [la chanson]",hint:"COD — что?",options:["le","la","les","y"],correct:"la",explanation:"la chanson → la (COD fem. sg.) → Nous l'écoutons"},
  {type:"Замените дополнение",sentence:"Je prends [du café]",hint:"Частичное количество",options:["le","la","en","y"],correct:"en",explanation:"du café → en (partitif) → J'en prends"},
  {type:"Замените дополнение",sentence:"Elle a [trois frères]",hint:"Количество",options:["les","en","y","leur"],correct:"en",explanation:"Числительное + сущ. → en → Elle en a trois"},
  {type:"Замените дополнение",sentence:"Il parle [à Marie]",hint:"COI — кому?",options:["le","la","lui","leur"],correct:"lui",explanation:"à Marie → lui (COI sg.) → Il lui parle"},
  {type:"Замените дополнение",sentence:"Tu téléphones [à tes parents]",hint:"COI — кому?",options:["les","leur","lui","y"],correct:"leur",explanation:"à tes parents → leur (COI pl.) → Tu leur téléphones"},
  {type:"Замените дополнение",sentence:"Elle pense [à son voyage]",hint:"à + вещь (не лицо!)",options:["lui","en","y","le"],correct:"y",explanation:"à + вещь → y → Elle y pense"},
  {type:"Замените дополнение",sentence:"Nous allons [à Paris]",hint:"à + место",options:["y","en","là","le"],correct:"y",explanation:"à Paris → y (место) → Nous y allons"},
  {type:"Замените дополнение",sentence:"Il vient [de France]",hint:"de + место",options:["y","en","de là","la"],correct:"en",explanation:"de France → en (происхождение) → Il en vient"},
  {type:"Замените дополнение",sentence:"Je donne le livre [à Paul]",hint:"COI — кому?",options:["le","lui","leur","y"],correct:"lui",explanation:"à Paul → lui (COI sg.) → Je lui donne le livre"},
  {type:"Замените дополнение",sentence:"Elles lisent [les journaux]",hint:"COD — что?",options:["le","la","les","en"],correct:"les",explanation:"les journaux → les (COD pl.) → Elles les lisent"},
  {type:"Замените дополнение",sentence:"Tu veux [de la salade]?",hint:"Частичное количество",options:["la","en","y","le"],correct:"en",explanation:"de la salade → en (partitif) → Tu en veux?"},
  {type:"Замените дополнение",sentence:"Il obéit [à ses professeurs]",hint:"COI — кому?",options:["les","leur","lui","y"],correct:"leur",explanation:"à ses professeurs → leur (COI pl.) → Il leur obéit"},
  {type:"Замените дополнение",sentence:"Je m'intéresse [à la musique]",hint:"à + вещь",options:["lui","y","en","la"],correct:"y",explanation:"à la musique → y (à + вещь) → Je m'y intéresse"},
  {type:"Замените дополнение",sentence:"Elle a peur [des araignées]",hint:"de + сущ.",options:["les","en","y","leur"],correct:"en",explanation:"des araignées → en (de + сущ.) → Elle en a peur"},
  {type:"Замените дополнение",sentence:"Nous attendons [le bus]",hint:"COD — что?",options:["le","la","les","y"],correct:"le",explanation:"le bus → le (COD masc. sg.) → Nous l'attendons"},
  {type:"Замените дополнение",sentence:"Il achète [des fleurs]",hint:"Неопределённое количество",options:["les","la","en","y"],correct:"en",explanation:"des fleurs → en (partitif/indéfini) → Il en achète"},

  // Pronoun order
  {type:"Порядок местоимений",sentence:"Il ___ ___ donne. (мне, это)",hint:"Расположите 2 местоимения",options:["me le","le me","me la","la me"],correct:"me le",explanation:"me/te/se/nous/vous идут ПЕРЕД le/la/les → Il me le donne"},
  {type:"Порядок местоимений",sentence:"Elle ___ ___ montre. (нам, их)",hint:"Расположите 2 местоимения",options:["nous les","les nous","nous le","le nous"],correct:"nous les",explanation:"nous идёт ПЕРЕД les → Elle nous les montre"},
  {type:"Порядок местоимений",sentence:"Je ___ ___ ai donné. (ему, это/m)",hint:"Расположите 2 местоимения",options:["le lui","lui le","la lui","lui la"],correct:"le lui",explanation:"le/la/les идут ПЕРЕД lui/leur → Je le lui ai donné"},

// ===================== APP STATE =====================
const TOPICS = [
  { id: "articles", label: "Артикли и род" },
  { id: "pronouns", label: "Местоимения" },
  { id: "pcimparfait", label: "PC vs Imparfait" },
  { id: "subjonctif", label: "Subjonctif" },
  { id: "all", label: "Все темы" },
];

let currentTopic = "all";
let questions = [];
let qIndex = 0;
let score = { correct: 0, total: 0, streak: 0, maxStreak: 0 };
let answered = false;
let advanceTimer = null;

// ===================== INIT =====================
function init() {
  renderTopics();
  loadScore();
  buildQuestions();
  showQuestion();
  document.addEventListener("keydown", handleKey);
}

function renderTopics() {
  const el = document.getElementById("topics");
  el.innerHTML = TOPICS.map(t =>
    `<button class="topic-btn${t.id === currentTopic ? ' active' : ''}" data-topic="${t.id}">${t.label}</button>`
  ).join("");
  el.querySelectorAll(".topic-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentTopic = btn.dataset.topic;
      renderTopics();
      buildQuestions();
      showQuestion();
    });
  });
}

// ===================== QUESTIONS =====================
function buildQuestions() {
  let pool = [];
  if (currentTopic === "articles" || currentTopic === "all") {
    pool = pool.concat(makeArticleQuestions());
  }
  if (currentTopic === "pronouns" || currentTopic === "all") {
    pool = pool.concat(pronounQuestions);
  }
  if (currentTopic === "pcimparfait" || currentTopic === "all") {
    pool = pool.concat(pcImpQuestions);
  }
  if (currentTopic === "subjonctif" || currentTopic === "all") {
    pool = pool.concat(subjonctifQuestions);
  }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  questions = pool;
  qIndex = 0;
}

function showQuestion() {
  if (questions.length === 0) return;
  if (qIndex >= questions.length) {
    // Reshuffle
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    qIndex = 0;
  }

  answered = false;
  clearTimeout(advanceTimer);

  const q = questions[qIndex];
  const card = document.getElementById("quizCard");
  card.classList.remove("flash-correct", "flash-wrong");

  document.getElementById("qType").textContent = q.type;
  document.getElementById("qSentence").innerHTML = formatSentence(q.sentence);
  document.getElementById("qHint").textContent = q.hint || "";

  const answersEl = document.getElementById("answers");
  answersEl.innerHTML = q.options.map((opt, i) =>
    `<button class="ans-btn" data-idx="${i}"><span class="key-hint">${i + 1}</span>${opt}</button>`
  ).join("");

  answersEl.querySelectorAll(".ans-btn").forEach(btn => {
    btn.addEventListener("click", () => selectAnswer(btn, q));
  });

  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("continueBtn").classList.remove("show");

  updateProgress();
  updateScoreDisplay();
}

function formatSentence(s) {
  // Highlight bracketed parts as blanks
  return s.replace(/\[([^\]]+)\]/g, '<span class="q-blank">$1</span>')
          .replace(/___/g, '<span class="q-blank">???</span>');
}

function selectAnswer(btn, q) {
  if (answered) return;
  answered = true;

  const selected = q.options[parseInt(btn.dataset.idx)];
  const isCorrect = selected === q.correct;
  const card = document.getElementById("quizCard");
  const answersEl = document.getElementById("answers");

  // Disable all buttons
  answersEl.querySelectorAll(".ans-btn").forEach(b => {
    b.classList.add("disabled");
    if (q.options[parseInt(b.dataset.idx)] === q.correct) {
      b.classList.add("correct");
    }
  });

  if (isCorrect) {
    btn.classList.add("correct");
    card.classList.add("flash-correct");
    score.correct++;
    score.streak++;
    if (score.streak > score.maxStreak) score.maxStreak = score.streak;
    showFeedback(true, q.explanation);
  } else {
    btn.classList.add("wrong");
    card.classList.add("flash-wrong");
    score.streak = 0;
    showFeedback(false, q.explanation);
  }

  score.total++;
  saveScore();
  updateScoreDisplay();

  document.getElementById("continueBtn").classList.add("show");
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "correct-fb" : "wrong-fb");
  fb.innerHTML = `<strong>${correct ? "Правильно! ✓" : "Неправильно ✗"}</strong><span class="explanation">${explanation}</span>`;
}

function nextQuestion() {
  clearTimeout(advanceTimer);
  qIndex++;
  showQuestion();
}

// ===================== SCORE =====================
function updateScoreDisplay() {
  document.getElementById("streak").textContent = score.streak;
  document.getElementById("correctCount").textContent = score.correct;
  document.getElementById("totalCount").textContent = score.total;
  const pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
  document.getElementById("pct").textContent = pct + "%";
}

function updateProgress() {
  const pct = questions.length > 0 ? Math.min(100, Math.round((qIndex / questions.length) * 100)) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
}

function resetScore() {
  score = { correct: 0, total: 0, streak: 0, maxStreak: 0 };
  saveScore();
  updateScoreDisplay();
  buildQuestions();
  showQuestion();
}

function saveScore() {
  try { localStorage.setItem("fr-quiz-score", JSON.stringify(score)); } catch(e) {}
}

function loadScore() {
  try {
    const s = JSON.parse(localStorage.getItem("fr-quiz-score"));
    if (s) score = { correct: s.correct || 0, total: s.total || 0, streak: s.streak || 0, maxStreak: s.maxStreak || 0 };
  } catch(e) {}
}

// ===================== KEYBOARD =====================
function handleKey(e) {
  if (answered) {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      nextQuestion();
    }
    return;
  }

  const keyMap = { "1": 0, "2": 1, "3": 2, "4": 3 };
  if (keyMap[e.key] !== undefined) {
    const btns = document.querySelectorAll("#answers .ans-btn");
    if (btns[keyMap[e.key]]) {
      btns[keyMap[e.key]].click();
    }
  }

  if (e.key === "Escape") {
    // Go back to "all topics"
    currentTopic = "all";
    renderTopics();
    buildQuestions();
    showQuestion();
  }
}

// ===================== START =====================
init();
</script>
