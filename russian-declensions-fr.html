// ============================================================
// SEARCH & DISPLAY FUNCTIONS
// ============================================================

function tryWord(w) {
  document.getElementById('wordInput').value = w;
  decline();
}

function normalize(s) {
  return s.trim().toLowerCase().replace(/ё/g, 'ё');
}

function isCyrillic(s) {
  return /[а-яёА-ЯЁ]/.test(s);
}

function findWord(input) {
  const q = normalize(input);

  // Try direct noun lookup
  for (const [key, data] of Object.entries(NOUNS)) {
    if (normalize(key) === q) return { type: 'noun', key, data, fromFr: false };
    // Also check if any form matches
    for (const f of data.forms) {
      if (normalize(f) === q) return { type: 'noun', key, data, fromFr: false };
    }
  }

  // Try direct adjective lookup
  for (const [key, data] of Object.entries(ADJECTIVES)) {
    if (normalize(key) === q) return { type: 'adj', key, data, fromFr: false };
    for (const f of data.forms) {
      if (normalize(f) === q) return { type: 'adj', key, data, fromFr: false };
    }
  }

  // Try French lookup
  if (!isCyrillic(q)) {
    const ruWord = FR_TO_RU[q] || FR_TO_RU[q.replace(/[éèêë]/g,'e').replace(/[àâ]/g,'a').replace(/[ùûü]/g,'u').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ç]/g,'c').replace(/[œ]/g,'oe')];
    if (ruWord) {
      // Check if it's a noun
      if (NOUNS[ruWord]) return { type: 'noun', key: ruWord, data: NOUNS[ruWord], fromFr: input.trim() };
      // Check if it's an adjective
      if (ADJECTIVES[ruWord]) return { type: 'adj', key: ruWord, data: ADJECTIVES[ruWord], fromFr: input.trim() };
    }
  }

  return null;
}

function decline() {
  const input = document.getElementById('wordInput').value.trim();
  if (!input) return;

  const result = findWord(input);
  const resultsDiv = document.getElementById('results');
  const infoDiv = document.getElementById('wordInfo');
  const warning = document.getElementById('warningBanner');

  warning.style.display = 'none';

  if (!result) {
    infoDiv.style.display = 'none';
    resultsDiv.innerHTML = '<div class="no-result">Mot non trouvé. Essayez un autre nom ou adjectif russe, ou un mot en français.</div>';
    return;
  }

  if (result.type === 'noun') {
    showNoun(result, infoDiv, resultsDiv);
  } else {
    showAdjective(result, infoDiv, resultsDiv);
  }
}

function showNoun(result, infoDiv, resultsDiv) {
  const { key, data, fromFr } = result;
  const genderLabels = { m: 'Masculin', f: 'Féminin', n: 'Neutre' };
  const genderColors = { m: '♂', f: '♀', n: '⚬' };

  let badges = '';
  badges += `<span class="badge badge-type">Nom</span>`;
  badges += `<span class="badge badge-gender">${genderColors[data.gender]} ${genderLabels[data.gender]}</span>`;
  badges += `<span class="badge badge-animate">${data.animate ? 'Animé' : 'Inanimé'}</span>`;
  if (data.class !== 'irregular') {
    badges += `<span class="badge badge-class">${data.class}<sup>e</sup> déclinaison</span>`;
  } else {
    badges += `<span class="badge badge-class">Irrégulier</span>`;
  }
  if (fromFr) {
    badges += `<span class="badge badge-translate">${fromFr} → ${key}</span>`;
  }
  if (data.translation) {
    badges += `<span class="badge badge-translate">FR: ${data.translation}</span>`;
  }

  infoDiv.innerHTML = badges;
  infoDiv.style.display = 'block';

  // Build declension table
  let html = '<div class="case-card"><div class="case-header"><div class="ru-name">Déclinaison du nom : ' + key + '</div></div>';
  html += '<div class="case-body"><table class="decl-table">';
  html += '<tr><th style="width:40%">Cas</th><th>Singulier</th><th>Pluriel</th></tr>';

  for (let i = 0; i < 6; i++) {
    const c = CASES[i];
    html += `<tr>`;
    html += `<td class="case-label">${c.ru}<br><span style="color:#7b2fa0;font-size:0.9em">${c.fr}</span><br><span style="font-weight:normal;color:#999;font-size:0.85em">${c.question}</span></td>`;
    html += `<td class="form">${data.forms[i]}</td>`;
    html += `<td class="form">${data.forms[i + 6]}</td>`;
    html += `</tr>`;
  }

  html += '</table></div></div>';

  // Add case explanations
  html += '<div class="case-card" style="margin-top:16px"><div class="case-header"><div class="ru-name">Explication des cas</div></div><div class="case-body">';
  for (let i = 0; i < 6; i++) {
    const c = CASES[i];
    html += `<div style="margin-bottom:10px;padding-bottom:10px;${i < 5 ? 'border-bottom:1px solid #f0f0f0' : ''}">`;
    html += `<strong style="color:#7b2fa0">${c.ru} (${c.fr})</strong> — <em>${c.question}</em><br>`;
    html += `<span style="color:#666;font-size:0.9em">${c.explain}</span>`;
    html += `</div>`;
  }
  html += '</div></div>';

  resultsDiv.innerHTML = html;
}

function showAdjective(result, infoDiv, resultsDiv) {
  const { key, data, fromFr } = result;

  let badges = '';
  badges += `<span class="badge badge-type">Adjectif</span>`;
  if (fromFr) {
    badges += `<span class="badge badge-translate">${fromFr} → ${key}</span>`;
  }
  if (data.translation) {
    badges += `<span class="badge badge-translate">FR: ${data.translation}</span>`;
  }

  infoDiv.innerHTML = badges;
  infoDiv.style.display = 'block';

  // Build adjective table: 6 rows × 4 columns (M, F, N, Pl)
  // forms layout: indices 0-5 = M cases, 6-11 = F cases, 12-17 = N cases, 18-23 = Pl cases
  let html = '<div class="case-card"><div class="case-header"><div class="ru-name">Déclinaison de l\'adjectif : ' + key + '</div></div>';
  html += '<div class="case-body"><table class="decl-table">';
  html += '<tr><th style="width:30%">Cas</th><th>♂ Masc.</th><th>♀ Fém.</th><th>⚬ Neutre</th><th>Pluriel</th></tr>';

  for (let i = 0; i < 6; i++) {
    const c = CASES[i];
    html += `<tr>`;
    html += `<td class="case-label">${c.ru}<br><span style="color:#7b2fa0;font-size:0.9em">${c.fr}</span><br><span style="font-weight:normal;color:#999;font-size:0.85em">${c.question}</span></td>`;
    html += `<td class="form">${data.forms[i]}</td>`;       // M
    html += `<td class="form">${data.forms[i + 6]}</td>`;   // F
    html += `<td class="form">${data.forms[i + 12]}</td>`;  // N
    html += `<td class="form">${data.forms[i + 18]}</td>`;  // Pl
    html += `</tr>`;
  }

  html += '</table>';
  html += '<div style="margin-top:10px;font-size:0.85em;color:#999;font-style:italic">Note : pour l\'accusatif des noms animés, utilisez la forme du génitif (masculin singulier et pluriel).</div>';
  html += '</div></div>';

  // Add case explanations
  html += '<div class="case-card" style="margin-top:16px"><div class="case-header"><div class="ru-name">Explication des cas</div></div><div class="case-body">';
  for (let i = 0; i < 6; i++) {
    const c = CASES[i];
    html += `<div style="margin-bottom:10px;padding-bottom:10px;${i < 5 ? 'border-bottom:1px solid #f0f0f0' : ''}">`;
    html += `<strong style="color:#7b2fa0">${c.ru} (${c.fr})</strong> — <em>${c.question}</em><br>`;
    html += `<span style="color:#666;font-size:0.9em">${c.explain}</span>`;
    html += `</div>`;
  }
  html += '</div></div>';

  resultsDiv.innerHTML = html;
}

// Handle URL parameters
try {
  const params = new URLSearchParams(location.search);
  if (params.get('w')) {
    document.getElementById('wordInput').value = params.get('w');
    decline();
  }
} catch(e) {}
if (location.hash) {
  document.getElementById('wordInput').value = decodeURIComponent(location.hash.slice(1));
  decline();
}
</script>
