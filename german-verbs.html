// ============================================================
// GROUP LABELS
// ============================================================
function groupLabel(g) {
  if (g === 'schwach') return 'Schwach (слабый, регулярный)';
  if (g === 'stark') return 'Stark (сильный)';
  if (g === 'gemischt') return 'Gemischt (смешанный)';
  if (g === 'modal') return 'Modalverb (модальный)';
  if (g === 'hilfsverb') return 'Hilfsverb (вспомогательный)';
  return g;
}

// ============================================================
// UI
// ============================================================
function tryVerb(v) {
  document.getElementById('verbInput').value = v;
  conjugate();
}

function conjugate() {
  const input = document.getElementById('verbInput').value.trim();
  const resultsDiv = document.getElementById('results');
  const verbInfoDiv = document.getElementById('verbInfo');
  const warningBanner = document.getElementById('warningBanner');

  if (!input) {
    resultsDiv.innerHTML = '';
    verbInfoDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  // Check if input is Russian
  let russianInput = null;
  let germanVerb = input.toLowerCase().trim();
  if (/[а-яё]/i.test(input)) {
    const lowerInput = input.toLowerCase().trim();
    if (RU_TO_DE[lowerInput]) {
      russianInput = lowerInput;
      germanVerb = RU_TO_DE[lowerInput];
    } else {
      resultsDiv.innerHTML = '<div class="no-result">Русский глагол \u00ab' + input + '\u00bb не найден в словаре.<br>Попробуйте ввести немецкий инфинитив (например: machen, sein, gehen)</div>';
      verbInfoDiv.style.display = 'none';
      warningBanner.style.display = 'none';
      return;
    }
  }

  // Strip leading "zu " if user typed it
  germanVerb = germanVerb.replace(/^zu\s+/, '');

  const v = VERBS[germanVerb];
  if (!v) {
    resultsDiv.innerHTML = '<div class="no-result">Глагол \u00ab' + germanVerb + '\u00bb не найден в базе.<br>Попробуйте ввести инфинитив (например: machen, sein, gehen)</div>';
    verbInfoDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  // Show separable verb warning
  if (v.separable) {
    warningBanner.style.display = 'block';
    warningBanner.innerHTML = '<b>⚠ Глагол с отделяемой приставкой «' + v.separable + '-»:</b> в главном предложении в Präsens и Präteritum приставка отделяется и уходит в конец. Пример: «Ich komme um 8 Uhr <b>an</b>.» (я прибываю в 8 часов). В Partizip II «ge-» ставится между приставкой и основой: <b>' + v.partizip2 + '</b>.';
  } else {
    warningBanner.style.display = 'none';
  }

  // Show verb info badges
  verbInfoDiv.style.display = 'block';
  let infoHTML = '';
  if (russianInput) {
    infoHTML += '<span class="badge badge-ru">&#128270; русский \u2192 deutsch: ' + russianInput + ' \u2192 ' + germanVerb + '</span>';
  }
  infoHTML += '<span class="badge badge-group">' + groupLabel(v.group) + '</span>';
  infoHTML += '<span class="badge badge-ru">\ud83c\uddf7\ud83c\uddfa ' + v.ru + '</span>';
  infoHTML += '<span class="badge badge-pp">Partizip II: ' + v.partizip2 + '</span>';
  infoHTML += '<span class="badge badge-prp">Hilfsverb: ' + v.aux + '</span>';
  verbInfoDiv.innerHTML = infoHTML;

  // Get examples
  const ex = EXAMPLES[germanVerb] || buildDefaultExamples(germanVerb, v);

  const PRONOUNS = ['ich', 'du', 'er/sie/es', 'wir', 'ihr', 'sie/Sie'];
  const PRONOUNS_RU = ['я', 'ты', 'он/она/оно', 'мы', 'вы', 'они/Вы'];
  const KEYS = ['ich', 'du', 'er', 'wir', 'ihr', 'sie'];

  // auxiliary präteritum forms for plusquamperfekt
  const AUX_PRAT = {
    haben: {ich:'hatte', du:'hattest', er:'hatte', wir:'hatten', ihr:'hattet', sie:'hatten'},
    sein:  {ich:'war',   du:'warst',   er:'war',   wir:'waren',  ihr:'wart',    sie:'waren'}
  };
  const AUX_PRAS = {
    haben: {ich:'habe', du:'hast', er:'hat', wir:'haben', ihr:'habt', sie:'haben'},
    sein:  {ich:'bin',  du:'bist', er:'ist', wir:'sind',  ihr:'seid', sie:'sind'}
  };
  const WERDEN_PRAS = {ich:'werde', du:'wirst', er:'wird', wir:'werden', ihr:'werdet', sie:'werden'};
  const WUERDE = {ich:'würde', du:'würdest', er:'würde', wir:'würden', ihr:'würdet', sie:'würden'};

  // Build tense cards
  let html = '';

  for (const tense of TENSES) {
    let forms = null; // object keyed by ich/du/er/wir/ihr/sie
    let singleForm = null;
    let examples = [];
    let isImperativ = false;
    let isInfinitiv = false;

    if (tense.id === 'infinitiv') {
      singleForm = germanVerb;
      isInfinitiv = true;
      examples = ['Er will <b>' + germanVerb + '</b>. — Он хочет ' + v.ru.split(',')[0].trim() + '.',
                  'Ich habe keine Zeit, zu <b>' + germanVerb + '</b>. — У меня нет времени ' + v.ru.split(',')[0].trim() + '.'];
    } else if (tense.id === 'präsens') {
      forms = v.präsens;
      examples = ex.präsens || [];
    } else if (tense.id === 'präteritum') {
      forms = v.präteritum_forms;
      examples = ex.präteritum || [];
    } else if (tense.id === 'perfekt') {
      forms = {};
      for (const k of KEYS) {
        forms[k] = AUX_PRAS[v.aux][k] + ' ' + v.partizip2;
      }
      examples = ex.perfekt || [];
    } else if (tense.id === 'plusquamperfekt') {
      forms = {};
      for (const k of KEYS) {
        forms[k] = AUX_PRAT[v.aux][k] + ' ' + v.partizip2;
      }
      examples = ex.plusquamperfekt || [];
    } else if (tense.id === 'futur1') {
      forms = {};
      // If separable, infinitive has no gap (e.g., "ankommen" not "komme an") — combined
      const infForm = v.separable ? (v.separable + germanVerb.slice(v.separable.length)) : germanVerb;
      // Actually the stored key IS the infinitive already (e.g., 'ankommen'). Use germanVerb directly.
      for (const k of KEYS) {
        forms[k] = WERDEN_PRAS[k] + ' ' + germanVerb;
      }
      examples = ex.futur1 || [];
    } else if (tense.id === 'futur2') {
      forms = {};
      for (const k of KEYS) {
        forms[k] = WERDEN_PRAS[k] + ' ' + v.partizip2 + ' ' + v.aux;
      }
      examples = ex.futur2 || [];
    } else if (tense.id === 'konjunktiv2') {
      forms = {};
      if (v.konjunktiv2_forms) {
        for (const k of KEYS) {
          forms[k] = v.konjunktiv2_forms[k];
        }
        examples = ex.konjunktiv2 || [];
        examples = examples.concat(['<i>Также часто: würde + ' + germanVerb + ' (аналитическая форма)</i>']);
      } else {
        // Use würde + infinitive for weak verbs
        for (const k of KEYS) {
          forms[k] = WUERDE[k] + ' ' + germanVerb;
        }
        examples = ex.konjunktiv2 || [];
        examples = examples.concat(['<i>У слабых глаголов Konjunktiv II совпадает с Präteritum, поэтому используется würde + инфинитив</i>']);
      }
    } else if (tense.id === 'imperativ') {
      isImperativ = true;
      if (v.imperativ_du) {
        forms = {
          'du': v.imperativ_du + '!',
          'ihr': v.imperativ_ihr + '!',
          'Sie': v.imperativ_sie + '!'
        };
        examples = ex.imperativ || [];
      } else {
        forms = null;
        singleForm = null;
      }
    }

    // Build Russian translation for this tense
    let ruForm = v.ru.split(',')[0].trim().replace(/\s*\(.*?\)\s*/g, '').trim();
    let ruTenseLabel = '';
    if (tense.id === 'infinitiv') ruTenseLabel = ruForm;
    else if (tense.id === 'präsens') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'ю(сь)' : 'ю'));
    else if (tense.id === 'präteritum') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
    else if (tense.id === 'perfekt') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
    else if (tense.id === 'plusquamperfekt') ruTenseLabel = 'уже ' + ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
    else if (tense.id === 'futur1') ruTenseLabel = 'буду ' + ruForm;
    else if (tense.id === 'futur2') ruTenseLabel = 'уже ' + ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л')) + ' к моменту';
    else if (tense.id === 'konjunktiv2') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся) бы' : 'л бы'));
    else if (tense.id === 'imperativ') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'й(ся)' : 'й')) + '!';

    html += '<div class="tense-card">';
    html += '<div class="tense-header">';
    html += '<div class="no-name">' + tense.name + '<span class="ru-translation">' + ruTenseLabel + '</span></div>';
    html += '<div class="ru-name">' + tense.ru + '</div>';
    html += '</div>';
    html += '<div class="tense-explain">' + tense.explain + '</div>';
    html += '<div class="tense-body">';

    if (isInfinitiv) {
      html += '<table><tr><td class="verb-form">' + singleForm + '</td><td class="pronoun" style="text-align:right">' + v.ru + '</td></tr></table>';
      for (const e of examples) { html += '<div class="example">' + e + '</div>'; }
    } else if (isImperativ) {
      if (!forms) {
        html += '<div style="color:#ccc;padding:8px 0;">Не употребляется для этого глагола</div>';
      } else {
        html += '<table>';
        html += '<tr><td class="pronoun">du</td><td class="verb-form">' + forms['du'] + '</td><td class="pronoun" style="text-align:right;width:auto;">ты</td></tr>';
        html += '<tr><td class="pronoun">ihr</td><td class="verb-form">' + forms['ihr'] + '</td><td class="pronoun" style="text-align:right;width:auto;">вы</td></tr>';
        html += '<tr><td class="pronoun">Sie</td><td class="verb-form">' + forms['Sie'] + '</td><td class="pronoun" style="text-align:right;width:auto;">Вы</td></tr>';
        html += '</table>';
        if (examples.length > 0) {
          html += '<div class="example">';
          for (const e of examples) { html += e + '<br>'; }
          html += '</div>';
        }
      }
    } else if (forms === null) {
      html += '<div style="color:#ccc;padding:8px 0;">Не употребляется для этого глагола</div>';
    } else {
      html += '<table>';
      for (let i = 0; i < 6; i++) {
        const key = KEYS[i];
        html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + forms[key] + '</td><td class="pronoun" style="text-align:right;width:auto;">' + PRONOUNS_RU[i] + '</td></tr>';
      }
      html += '</table>';
      if (examples.length > 0) {
        html += '<div class="example">';
        for (const e of examples) { html += e + '<br>'; }
        html += '</div>';
      }
    }

    html += '</div></div>';
  }

  resultsDiv.innerHTML = html;
}

// ============================================================
// DEFAULT EXAMPLES BUILDER
// ============================================================
function buildDefaultExamples(inf, v) {
  const ex = {};
  const ruBase = v.ru.split(',')[0].trim().replace(/\s*\(.*?\)\s*/g, '').trim();
  const ruPast = ruBase.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
  const ruPres = ruBase.replace(/ть(ся)?$/, (m, s) => (s ? 'ю(сь)' : 'ю'));
  ex.präsens = ['Ich <b>' + v.präsens.ich + '</b>. — Я ' + ruPres + '.'];
  ex.präteritum = ['Ich <b>' + v.präteritum_forms.ich + '</b>. — Я ' + ruPast + '.'];
  ex.perfekt = ['Ich <b>' + (v.aux === 'sein' ? 'bin' : 'habe') + ' ' + v.partizip2 + '</b>. — Я ' + ruPast + '.'];
  ex.plusquamperfekt = ['Ich <b>' + (v.aux === 'sein' ? 'war' : 'hatte') + ' ' + v.partizip2 + '</b>. — Я уже ' + ruPast + '.'];
  ex.futur1 = ['Ich <b>werde ' + inf + '</b>. — Я буду ' + ruBase + '.'];
  ex.futur2 = ['Ich <b>werde ' + v.partizip2 + ' ' + v.aux + '</b>. — Я уже ' + ruPast + ' к тому моменту.'];
  if (v.konjunktiv2_forms) {
    ex.konjunktiv2 = ['Ich <b>' + v.konjunktiv2_forms.ich + '</b>. — Я ' + ruPast + ' бы.'];
  } else {
    ex.konjunktiv2 = ['Ich <b>würde ' + inf + '</b>. — Я ' + ruPast + ' бы.'];
  }
  if (v.imperativ_du) {
    ex.imperativ = ['<b>' + v.imperativ_du.charAt(0).toUpperCase() + v.imperativ_du.slice(1) + '!</b> — ' + ruBase.replace(/ть(ся)?$/, (m, s) => (s ? 'й(ся)' : 'й')) + '!'];
  }
  return ex;
}

// Auto-conjugate if there's a hash
if (location.hash) {
  document.getElementById('verbInput').value = decodeURIComponent(location.hash.slice(1));
  conjugate();
}
</script>
