<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇬🇧</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EN quiz">
<title>🇬🇧 Тренажёр английской грамматики</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #eef2ed;
    color: #2c2c2c;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, #1a3d2e, #1a5c3a);
    color: white;
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
  }
  header h1 { font-size: 1.8em; font-weight: 600; }
  header p { margin-top: 6px; opacity: 0.85; font-size: 0.95em; }
  .lang-switches {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .lang-switch {
    background: rgba(255,255,255,0.15);
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.95em;
    transition: background 0.2s;
  }
  .lang-switch:hover { background: rgba(255,255,255,0.3); }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }

  /* Topic selector */
  .topics {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0 0 18px;
  }
  .topic-btn {
    padding: 10px 18px;
    border: 2px solid #1a5c3a;
    background: white;
    color: #1a5c3a;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 600;
    transition: all 0.2s;
  }
  .topic-btn:hover { background: #e8f0ec; }
  .topic-btn.active {
    background: #1a5c3a;
    color: white;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
    background: white;
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 18px;
    font-size: 0.95em;
  }
  .score-item { display: flex; align-items: center; gap: 5px; }
  .score-item .label { color: #888; }
  .score-item .value { font-weight: 700; color: #1a3d2e; }
  .streak-fire { font-size: 1.2em; }
  .score-bar .reset-btn {
    padding: 6px 14px;
    background: #e8f0ec;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85em;
    color: #555;
    transition: background 0.2s;
  }
  .score-bar .reset-btn:hover { background: #d0e0d6; }

  /* Progress bar */
  .progress-wrap {
    height: 6px;
    background: #dde5dd;
    border-radius: 3px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a5c3a, #2d8a5e);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Quiz card */
  .quiz-card {
    background: white;
    border-radius: 16px;
    padding: 36px 30px 30px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
    transition: background-color 0.3s;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .quiz-card.flash-correct { background-color: #e6f9ec; }
  .quiz-card.flash-wrong { background-color: #fde8e8; }

  .q-type {
    font-size: 0.85em;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .q-sentence {
    font-size: 1.5em;
    font-weight: 600;
    color: #1a3d2e;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .q-hint {
    font-size: 0.9em;
    color: #888;
    margin-bottom: 24px;
    font-style: italic;
  }
  .q-blank {
    background: #edf5f0;
    border: 2px dashed #a8c9b8;
    border-radius: 8px;
    padding: 4px 14px;
    display: inline-block;
    min-width: 60px;
    color: #1a5c3a;
    font-weight: 700;
  }

  /* Answer buttons */
  .answers {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .ans-btn {
    padding: 14px 24px;
    min-width: 100px;
    min-height: 48px;
    border: 2px solid #c0d5c8;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1em;
    font-weight: 600;
    color: #2c2c2c;
    transition: all 0.15s;
    position: relative;
  }
  .ans-btn:hover:not(.disabled) {
    border-color: #1a5c3a;
    background: #edf5f0;
    transform: translateY(-1px);
  }
  .ans-btn.correct {
    border-color: #38a169;
    background: #e6f9ec;
    color: #22653a;
  }
  .ans-btn.wrong {
    border-color: #e53e3e;
    background: #fde8e8;
    color: #9b2c2c;
  }
  .ans-btn.disabled { cursor: default; opacity: 0.6; }
  .ans-btn .key-hint {
    position: absolute;
    top: 3px;
    right: 7px;
    font-size: 0.6em;
    color: #aaa;
    font-weight: 400;
  }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.95em;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb {
    background: #e6f9ec;
    color: #22653a;
    border: 1px solid #b2e5c5;
  }
  .feedback.wrong-fb {
    background: #fde8e8;
    color: #9b2c2c;
    border: 1px solid #f5b8b8;
  }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 1.05em; }
  .feedback .explanation { font-size: 0.9em; opacity: 0.85; }

  .continue-btn {
    margin-top: 16px;
    padding: 14px 36px;
    background: linear-gradient(135deg, #1a5c3a, #2d8a5e);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.05em;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .continue-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,92,58,0.3); }
  .continue-btn.show { display: inline-block; }

  @media (max-width: 500px) {
    header h1 { font-size: 1.3em; }
    header p { font-size: 0.85em; }
    .quiz-card { padding: 24px 16px 22px; }
    .q-sentence { font-size: 1.25em; }
    .ans-btn { padding: 12px 16px; min-width: 80px; font-size: 1em; }
    .topic-btn { padding: 8px 12px; font-size: 0.85em; }
    .score-bar { gap: 10px; font-size: 0.85em; padding: 10px 14px; }
    .container { padding: 14px 12px 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="lang-switches">
    <a href="index.html" class="lang-switch">📖 Портал</a>
  </div>
  <h1>🇬🇧 Тренажёр английской грамматики</h1>
  <p>Интерактивные упражнения по ключевым темам</p>
</header>

<div class="container">
  <div class="topics" id="topics"></div>

  <div class="score-bar" id="scoreBar">
    <div class="score-item"><span class="streak-fire">🔥</span> <span class="label">Серия:</span> <span class="value" id="streak">0</span></div>
    <div class="score-item"><span class="label">Верно:</span> <span class="value" id="correctCount">0</span> / <span class="value" id="totalCount">0</span></div>
    <div class="score-item"><span class="label">Точность:</span> <span class="value" id="pct">0%</span></div>
    <button class="reset-btn" onclick="resetScore()">Сбросить</button>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

  <div class="quiz-card" id="quizCard">
    <div class="q-type" id="qType"></div>
    <div class="q-sentence" id="qSentence"></div>
    <div class="q-hint" id="qHint"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="continue-btn" id="continueBtn" onclick="nextQuestion()">Далее →</button>
  </div>
</div>

<script>
// ===================== DATA =====================

// ---- Topic 1: Articles (a/an/the/∅) ----
const articleQuestions = [
  // a vs an
  {type:"A или AN?",sentence:"___ university",hint:"Звук [juː], не гласный!",options:["a","an"],correct:"a",explanation:"a university — звук [juː] = согласный, поэтому a"},
  {type:"A или AN?",sentence:"___ umbrella",hint:"Звук [ʌ] = гласный",options:["a","an"],correct:"an",explanation:"an umbrella — звук [ʌ] = гласный, поэтому an"},
  {type:"A или AN?",sentence:"___ hour",hint:"H не произносится!",options:["a","an"],correct:"an",explanation:"an hour — h немое, звук [aʊ] = гласный"},
  {type:"A или AN?",sentence:"___ honest man",hint:"H не произносится",options:["a","an"],correct:"an",explanation:"an honest man — h немое, звук [ɒn]"},
  {type:"A или AN?",sentence:"___ European country",hint:"Звук [jʊə]",options:["a","an"],correct:"a",explanation:"a European — звук [j] = согласный"},
  {type:"A или AN?",sentence:"___ FBI agent",hint:"F = [ef]",options:["a","an"],correct:"an",explanation:"an FBI agent — F читается [ef], начинается с гласного звука"},
  {type:"A или AN?",sentence:"___ one-way street",hint:"One = [wʌn]",options:["a","an"],correct:"a",explanation:"a one-way street — one начинается с [w] = согласный"},
  {type:"A или AN?",sentence:"___ X-ray",hint:"X = [eks]",options:["a","an"],correct:"an",explanation:"an X-ray — X читается [eks], начинается с гласного"},
  {type:"A или AN?",sentence:"___ useful tool",hint:"Звук [juː]",options:["a","an"],correct:"a",explanation:"a useful — звук [juː] = согласный"},
  {type:"A или AN?",sentence:"___ heir",hint:"H не произносится",options:["a","an"],correct:"an",explanation:"an heir — h немое, [eə] = гласный звук"},
  {type:"A или AN?",sentence:"___ MP3 player",hint:"M = [em]",options:["a","an"],correct:"an",explanation:"an MP3 — M читается [em], начинается с гласного"},
  {type:"A или AN?",sentence:"___ uniform",hint:"Звук [juː]",options:["a","an"],correct:"a",explanation:"a uniform — звук [juːnɪfɔːm] = согласный"},
  {type:"A или AN?",sentence:"___ orange",hint:"Звук [ɒ]",options:["a","an"],correct:"an",explanation:"an orange — гласный звук [ɒ]"},
  {type:"A или AN?",sentence:"___ usual day",hint:"Звук [juː]",options:["a","an"],correct:"a",explanation:"a usual — звук [juː] = согласный"},
  {type:"A или AN?",sentence:"___ SMS",hint:"S = [es]",options:["a","an"],correct:"an",explanation:"an SMS — S читается [es], начинается с гласного"},

  // a / the / ∅
  {type:"Какой артикль?",sentence:"___ sun is very bright today.",hint:"Единственный в своём роде",options:["A","The","∅ (без артикля)"],correct:"The",explanation:"The sun — единственное солнце, уникальный объект → the"},
  {type:"Какой артикль?",sentence:"She is ___ doctor.",hint:"Профессия",options:["a","the","∅ (без артикля)"],correct:"a",explanation:"She is a doctor — профессия = a/an"},
  {type:"Какой артикль?",sentence:"I love ___ music.",hint:"В целом, вообще",options:["a","the","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"I love music — абстрактное/неисчисляемое в общем → без артикля"},
  {type:"Какой артикль?",sentence:"___ water in this glass is dirty.",hint:"Конкретная вода",options:["A","The","∅ (без артикля)"],correct:"The",explanation:"The water in this glass — конкретная, определённая → the"},
  {type:"Какой артикль?",sentence:"I need ___ water.",hint:"Вообще, любая",options:["a","the","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"I need water — неисчисляемое в общем → без артикля"},
  {type:"Какой артикль?",sentence:"He plays ___ guitar.",hint:"Музыкальный инструмент",options:["a","the","∅ (без артикля)"],correct:"the",explanation:"He plays the guitar — музыкальные инструменты → the"},
  {type:"Какой артикль?",sentence:"I saw ___ interesting film yesterday.",hint:"Первое упоминание",options:["a","the","∅ (без артикля)"],correct:"a",explanation:"an interesting film — первое упоминание, неизвестно какой → a/an"},
  {type:"Какой артикль?",sentence:"___ film was about robots.",hint:"Уже упоминали",options:["A","The","∅ (без артикля)"],correct:"The",explanation:"The film — уже знаем какой (упомянули раньше) → the"},
  {type:"Какой артикль?",sentence:"___ dogs are loyal animals.",hint:"Вид в целом",options:["A","The","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"Dogs (мн.ч. в общем) — вид в целом → без артикля"},
  {type:"Какой артикль?",sentence:"___ dogs next door bark all night.",hint:"Конкретные собаки",options:["A","The","∅ (без артикля)"],correct:"The",explanation:"The dogs next door — конкретные, определённые собаки → the"},
  {type:"Какой артикль?",sentence:"She went to ___ bed.",hint:"Устойчивое выражение (ложиться спать)",options:["a","the","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"go to bed — устойчивое выражение (= ложиться спать), без артикля"},
  {type:"Какой артикль?",sentence:"I sat on ___ bed.",hint:"Конкретная кровать как предмет",options:["a","the","∅ (без артикля)"],correct:"the",explanation:"the bed — конкретный физический предмет → the"},
  {type:"Какой артикль?",sentence:"He is ___ tallest boy in class.",hint:"Превосходная степень",options:["a","the","∅ (без артикля)"],correct:"the",explanation:"the tallest — превосходная степень → всегда the"},
  {type:"Какой артикль?",sentence:"___ life is beautiful.",hint:"Жизнь в целом",options:["A","The","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"Life (абстрактное, в целом) → без артикля"},
  {type:"Какой артикль?",sentence:"She goes to ___ school every day.",hint:"Устойчивое выражение (учиться)",options:["a","the","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"go to school = учиться → без артикля. Но: go to the school = идти к зданию"},
  {type:"Какой артикль?",sentence:"___ Mount Everest is the highest peak.",hint:"Имя собственное (гора)",options:["A","The","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"Mount Everest — имена гор без артикля (но: the Alps, the Himalayas — хребты с the)"},
  {type:"Какой артикль?",sentence:"He swam across ___ Atlantic.",hint:"Океан",options:["a","the","∅ (без артикля)"],correct:"the",explanation:"the Atlantic — океаны, моря, реки → всегда the"},
  {type:"Какой артикль?",sentence:"I had ___ breakfast at 8.",hint:"Приём пищи",options:["a","the","∅ (без артикля)"],correct:"∅ (без артикля)",explanation:"have breakfast — приёмы пищи без артикля (но: the breakfast was delicious)"},
  {type:"Какой артикль?",sentence:"She works in ___ hospital.",hint:"Профессиональная деятельность",options:["a","the","∅ (без артикля)"],correct:"a",explanation:"in a hospital — неопределённый, какая-то больница → a"},
  {type:"Какой артикль?",sentence:"___ Thames flows through London.",hint:"Река",options:["A","The","∅ (без артикля)"],correct:"The",explanation:"The Thames — реки → всегда the"},
];

// ---- Topic 2: Prepositions (in/on/at etc.) ----
const prepositionQuestions = [
  // Time
  {type:"Предлог времени",sentence:"I was born ___ 1995.",hint:"Год",options:["in","on","at"],correct:"in",explanation:"in 1995 — годы → in"},
  {type:"Предлог времени",sentence:"The meeting is ___ Monday.",hint:"День недели",options:["in","on","at"],correct:"on",explanation:"on Monday — дни недели → on"},
  {type:"Предлог времени",sentence:"I wake up ___ 7 o'clock.",hint:"Время",options:["in","on","at"],correct:"at",explanation:"at 7 o'clock — точное время → at"},
  {type:"Предлог времени",sentence:"It's cold ___ winter.",hint:"Время года",options:["in","on","at"],correct:"in",explanation:"in winter — времена года → in"},
  {type:"Предлог времени",sentence:"We met ___ Christmas Day.",hint:"Конкретный день",options:["in","on","at"],correct:"on",explanation:"on Christmas Day — конкретный день → on (но: at Christmas = в период Рождества)"},
  {type:"Предлог времени",sentence:"She called ___ night.",hint:"Время суток",options:["in","on","at"],correct:"at",explanation:"at night — ИСКЛЮЧЕНИЕ: at night (но: in the morning/afternoon/evening)"},
  {type:"Предлог времени",sentence:"I'll finish ___ the morning.",hint:"Время суток",options:["in","on","at"],correct:"in",explanation:"in the morning — утро/день/вечер → in the..."},
  {type:"Предлог времени",sentence:"The exam is ___ March 15th.",hint:"Конкретная дата",options:["in","on","at"],correct:"on",explanation:"on March 15th — конкретная дата → on"},
  {type:"Предлог времени",sentence:"I'll be there ___ 5 minutes.",hint:"Через...",options:["in","on","at"],correct:"in",explanation:"in 5 minutes — через (промежуток времени) → in"},
  {type:"Предлог времени",sentence:"We go swimming ___ Saturdays.",hint:"По субботам (регулярно)",options:["in","on","at"],correct:"on",explanation:"on Saturdays — дни недели (даже регулярно) → on"},
  {type:"Предлог времени",sentence:"I haven't seen her ___ last year.",hint:"С прошлого года",options:["since","for","during"],correct:"since",explanation:"since last year — since + момент начала"},
  {type:"Предлог времени",sentence:"I've lived here ___ 10 years.",hint:"В течение 10 лет",options:["since","for","during"],correct:"for",explanation:"for 10 years — for + длительность"},
  {type:"Предлог времени",sentence:"I fell asleep ___ the film.",hint:"Во время фильма",options:["since","for","during"],correct:"during",explanation:"during the film — during + существительное (период)"},

  // Place
  {type:"Предлог места",sentence:"She lives ___ Paris.",hint:"Город",options:["in","on","at"],correct:"in",explanation:"in Paris — города → in"},
  {type:"Предлог места",sentence:"The book is ___ the table.",hint:"На поверхности",options:["in","on","at"],correct:"on",explanation:"on the table — на поверхности → on"},
  {type:"Предлог места",sentence:"I'll meet you ___ the bus stop.",hint:"Точка/пункт",options:["in","on","at"],correct:"at",explanation:"at the bus stop — точка/пункт → at"},
  {type:"Предлог места",sentence:"There's a bird ___ the tree.",hint:"Внутри (среди веток)",options:["in","on","at"],correct:"in",explanation:"in the tree — внутри (среди веток) → in"},
  {type:"Предлог места",sentence:"The picture is ___ the wall.",hint:"На стене",options:["in","on","at"],correct:"on",explanation:"on the wall — на поверхности стены → on"},
  {type:"Предлог места",sentence:"She works ___ a bank.",hint:"Внутри здания",options:["in","on","at"],correct:"in",explanation:"in a bank — внутри помещения → in (at a bank тоже можно — как пункт)"},
  {type:"Предлог места",sentence:"He's ___ home.",hint:"Дома",options:["in","on","at"],correct:"at",explanation:"at home — устойчивое: at home, at work, at school"},
  {type:"Предлог места",sentence:"I'm ___ the bus.",hint:"В транспорте (большом)",options:["in","on","at"],correct:"on",explanation:"on the bus — автобус, поезд, самолёт → on (но: in a car, in a taxi)"},
  {type:"Предлог места",sentence:"She's ___ the car.",hint:"В машине",options:["in","on","at"],correct:"in",explanation:"in the car — машина, такси → in"},

  // Direction & movement
  {type:"Предлог направления",sentence:"I'm going ___ the office.",hint:"Куда? В направлении",options:["to","at","in"],correct:"to",explanation:"to the office — направление движения → to"},
  {type:"Предлог направления",sentence:"The cat jumped ___ the box.",hint:"Внутрь",options:["into","in","to"],correct:"into",explanation:"into the box — движение внутрь → into"},
  {type:"Предлог направления",sentence:"She walked ___ the room.",hint:"Из, наружу",options:["out of","from","off"],correct:"out of",explanation:"out of the room — изнутри наружу → out of"},
  {type:"Предлог направления",sentence:"He ran ___ the street.",hint:"Через (с одной стороны на другую)",options:["across","through","along"],correct:"across",explanation:"across the street — по поверхности с одной стороны на другую"},
  {type:"Предлог направления",sentence:"We drove ___ the tunnel.",hint:"Через (внутри, насквозь)",options:["across","through","along"],correct:"through",explanation:"through the tunnel — сквозь, через внутреннее пространство"},

function makeVerbQuestions() {
  const qs = [];
  for (const [v1, v2, v3, ru] of irregVerbs) {
    // V1 → V2
    const wrongV2 = getWrongOptions(v2, irregVerbs.map(v => v[1]));
    qs.push({
      type: "Past Simple (V2)",
      sentence: `${v1} → ___`,
      hint: `${ru}`,
      options: shuffle([v2, ...wrongV2]).slice(0, 4),
      correct: v2,
      explanation: `${v1} → ${v2} → ${v3} (${ru})`
    });

    // V1 → V3
    const wrongV3 = getWrongOptions(v3, irregVerbs.map(v => v[2]));
    qs.push({
      type: "Past Participle (V3)",
      sentence: `${v1} → ___ → ___`,
      hint: `${ru} (3-я форма)`,
      options: shuffle([v3, ...wrongV3]).slice(0, 4),
      correct: v3,
      explanation: `${v1} → ${v2} → ${v3} (${ru})`
    });
  }
  return qs;
}

function getWrongOptions(correct, pool) {
  const unique = [...new Set(pool.filter(x => x !== correct))];
  const shuffled = shuffle([...unique]);
  return shuffled.slice(0, 3);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    {meaning:"терпеть / мириться",options:["put up with","put off","put on","put out"],correct:"put up with",explanation:"put up with = терпеть, мириться с чем-то"},
    {meaning:"придумать",options:["come up with","come across","come back","come in"],correct:"come up with",explanation:"come up with = придумать"},
    {meaning:"разобраться / понять",options:["figure out","find out","work out","point out"],correct:"figure out",explanation:"figure out = разобраться, понять"},
    {meaning:"избавиться от",options:["get rid of","get over","get along","get up"],correct:"get rid of",explanation:"get rid of = избавиться от"},
    {meaning:"оказаться (в итоге)",options:["turn out","turn off","turn up","turn down"],correct:"turn out",explanation:"turn out = оказаться"},
  ];

  for (const r of reversed) {
    qs.push({
      type: "Переведите на английский",
      sentence: r.meaning,
      hint: "Какой фразовый глагол?",
      options: r.options,
      correct: r.correct,
      explanation: r.explanation
    });
  }

  return qs;
}

// ===================== APP STATE =====================
const TOPICS = [
  { id: "articles", label: "Артикли" },
  { id: "prepositions", label: "Предлоги" },
  { id: "tenses", label: "Времена" },
  { id: "verbs", label: "Неправильные глаголы" },
  { id: "phrasal", label: "Фразовые глаголы" },
  { id: "all", label: "Все темы" },
];

let currentTopic = "all";
let questions = [];
let qIndex = 0;
let score = { correct: 0, total: 0, streak: 0, maxStreak: 0 };
let answered = false;

// ===================== INIT =====================
function init() {
  renderTopics();
  loadScore();
  buildQuestions();
  showQuestion();
  document.addEventListener("keydown", handleKey);
}

function renderTopics() {
  const el = document.getElementById("topics");
  el.innerHTML = TOPICS.map(t =>
    `<button class="topic-btn${t.id === currentTopic ? ' active' : ''}" data-topic="${t.id}">${t.label}</button>`
  ).join("");
  el.querySelectorAll(".topic-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentTopic = btn.dataset.topic;
      renderTopics();
      buildQuestions();
      showQuestion();
    });
  });
}

// ===================== QUESTIONS =====================
function buildQuestions() {
  let pool = [];
  if (currentTopic === "articles" || currentTopic === "all") {
    pool = pool.concat(articleQuestions);
  }
  if (currentTopic === "prepositions" || currentTopic === "all") {
    pool = pool.concat(prepositionQuestions);
  }
  if (currentTopic === "tenses" || currentTopic === "all") {
    pool = pool.concat(tenseQuestions);
  }
  if (currentTopic === "verbs" || currentTopic === "all") {
    pool = pool.concat(makeVerbQuestions());
  }
  if (currentTopic === "phrasal" || currentTopic === "all") {
    pool = pool.concat(makePhrasalQuestions());
  }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  questions = pool;
  qIndex = 0;
}

function showQuestion() {
  if (questions.length === 0) return;
  if (qIndex >= questions.length) {
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    qIndex = 0;
  }

  answered = false;

  const q = questions[qIndex];
  const card = document.getElementById("quizCard");
  card.classList.remove("flash-correct", "flash-wrong");

  document.getElementById("qType").textContent = q.type;
  document.getElementById("qSentence").innerHTML = formatSentence(q.sentence);
  document.getElementById("qHint").textContent = q.hint || "";

  const answersEl = document.getElementById("answers");
  answersEl.innerHTML = q.options.map((opt, i) =>
    `<button class="ans-btn" data-idx="${i}"><span class="key-hint">${i + 1}</span>${opt}</button>`
  ).join("");

  answersEl.querySelectorAll(".ans-btn").forEach(btn => {
    btn.addEventListener("click", () => selectAnswer(btn, q));
  });

  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("continueBtn").classList.remove("show");

  updateProgress();
  updateScoreDisplay();
}

function formatSentence(s) {
  return s.replace(/\[([^\]]+)\]/g, '<span class="q-blank">$1</span>')
          .replace(/___/g, '<span class="q-blank">???</span>');
}

function selectAnswer(btn, q) {
  if (answered) return;
  answered = true;

  const selected = q.options[parseInt(btn.dataset.idx)];
  const isCorrect = selected === q.correct;
  const card = document.getElementById("quizCard");
  const answersEl = document.getElementById("answers");

  answersEl.querySelectorAll(".ans-btn").forEach(b => {
    b.classList.add("disabled");
    if (q.options[parseInt(b.dataset.idx)] === q.correct) {
      b.classList.add("correct");
    }
  });

  if (isCorrect) {
    btn.classList.add("correct");
    card.classList.add("flash-correct");
    score.correct++;
    score.streak++;
    if (score.streak > score.maxStreak) score.maxStreak = score.streak;
    showFeedback(true, q.explanation);
  } else {
    btn.classList.add("wrong");
    card.classList.add("flash-wrong");
    score.streak = 0;
    showFeedback(false, q.explanation);
  }

  score.total++;
  saveScore();
  updateScoreDisplay();

  document.getElementById("continueBtn").classList.add("show");
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "correct-fb" : "wrong-fb");
  fb.innerHTML = `<strong>${correct ? "Правильно! ✓" : "Неправильно ✗"}</strong><span class="explanation">${explanation}</span>`;
}

function nextQuestion() {
  qIndex++;
  showQuestion();
}

// ===================== SCORE =====================
function updateScoreDisplay() {
  document.getElementById("streak").textContent = score.streak;
  document.getElementById("correctCount").textContent = score.correct;
  document.getElementById("totalCount").textContent = score.total;
  const pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
  document.getElementById("pct").textContent = pct + "%";
}

function updateProgress() {
  const pct = questions.length > 0 ? Math.min(100, Math.round((qIndex / questions.length) * 100)) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
}

function resetScore() {
  score = { correct: 0, total: 0, streak: 0, maxStreak: 0 };
  saveScore();
  updateScoreDisplay();
  buildQuestions();
  showQuestion();
}

function saveScore() {
  try { localStorage.setItem("en-quiz-score", JSON.stringify(score)); } catch(e) {}
}

function loadScore() {
  try {
    const s = JSON.parse(localStorage.getItem("en-quiz-score"));
    if (s) score = { correct: s.correct || 0, total: s.total || 0, streak: s.streak || 0, maxStreak: s.maxStreak || 0 };
  } catch(e) {}
}

// ===================== KEYBOARD =====================
function handleKey(e) {
  if (answered) {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      nextQuestion();
    }
    return;
  }

  const keyMap = { "1": 0, "2": 1, "3": 2, "4": 3 };
  if (keyMap[e.key] !== undefined) {
    const btns = document.querySelectorAll("#answers .ans-btn");
    if (btns[keyMap[e.key]]) {
      btns[keyMap[e.key]].click();
    }
  }

  if (e.key === "Escape") {
    currentTopic = "all";
    renderTopics();
    buildQuestions();
    showQuestion();
  }
}

// ===================== START =====================
init();
</script>
