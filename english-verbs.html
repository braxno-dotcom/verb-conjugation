  .lang-switches {

    top: 16px;
    right: 20px;
    display: flex;
    gap: 8px;
  }
  .lang-switch {
    background: rgba(255,255,255,0.15);
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.95em;
    transition: background 0.2s;
  }
  .lang-switch:hover { background: rgba(255,255,255,0.3); }
  header { position: relative; }

  .search-area {
    max-width: 600px;
    margin: 30px auto 10px;
    padding: 0 20px;
    display: flex;
    gap: 10px;
  }
  .search-area input {
    flex: 1;
    padding: 14px 18px;
    font-size: 1.15em;
    border: 2px solid #c8bfb6;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-area input:focus { border-color: #2d8659; }
  .search-area button {
    padding: 14px 28px;
    font-size: 1.05em;
    background: #2d8659;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  .search-area button:hover { background: #1a5c3a; }

  .hint {
    max-width: 600px;
    margin: 8px auto 0;
    padding: 0 20px;
    font-size: 0.85em;
    color: #888;
  }
  .hint span { cursor: pointer; color: #2d8659; text-decoration: underline; }
  .hint span:hover { color: #1a5c3a; }

  .verb-info {
    max-width: 900px;
    margin: 18px auto 8px;
    padding: 0 20px;
    display: none;
  }
  .verb-info .badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 0.9em;
    font-weight: 600;
    margin-right: 8px;
    margin-bottom: 6px;

  .badge-group { background: #e0f2e9; color: #1a5c3a; }
  .badge-aux { background: #fce4ec; color: #880e4f; }
  .badge-pp { background: #e8f5e9; color: #1b5e20; }
  .badge-gp { background: #fff3e0; color: #e65100; }
  .badge-ru { background: #e3f2fd; color: #0d47a1; }

  .legend {
    max-width: 900px;
    margin: 10px auto;
    padding: 0 20px;
    display: none;
  }
  .legend-inner {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 0.85em;
    color: #666;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {

  }
  .dot-active { background: #2d8659; }
  .dot-literary { background: #9e9e9e; }

  #results {
    max-width: 900px;
    margin: 10px auto 40px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
  }

    header h1 { font-size: 1.3em; }

    .lang-switches { position: static; display: flex; justify-content: center; margin-bottom: 10px; }

    .hint { padding: 0 10px; }
    .verb-info { padding: 0 10px; }
    .verb-info .badge { font-size: 0.8em; padding: 4px 10px; }

    .warning-banner { margin: 10px 10px; }
    .tense-header { padding: 10px 12px; }
    .tense-header .en-name { font-size: 0.95em; }
    .tense-body { padding: 10px 12px; }

<div class="search-area">

</div>

// ============================================================
// CONJUGATION ENGINE
// ============================================================

// Regular verb rules
function addEd(base) {
  if (base.endsWith('e')) return base + 'd';
  if (base.endsWith('y') && !isVowel(base[base.length - 2])) return base.slice(0, -1) + 'ied';
  if (shouldDouble(base)) return base + base[base.length - 1] + 'ed';
  return base + 'ed';
}

function addIng(base) {
  if (base === 'be') return 'being';
  if (base.endsWith('ie')) return base.slice(0, -2) + 'ying';
  if (base.endsWith('e') && !base.endsWith('ee') && !base.endsWith('ye') && !base.endsWith('oe')) return base.slice(0, -1) + 'ing';
  if (shouldDouble(base)) return base + base[base.length - 1] + 'ing';
  return base + 'ing';
}

function addS(base) {
  if (base.endsWith('y') && !isVowel(base[base.length - 2])) return base.slice(0, -1) + 'ies';
  if (base.endsWith('s') || base.endsWith('sh') || base.endsWith('ch') || base.endsWith('x') || base.endsWith('z') || base.endsWith('o')) return base + 'es';
  return base + 's';
}

function isVowel(ch) {
  return 'aeiou'.includes((ch || '').toLowerCase());
}

function shouldDouble(base) {
  if (base.length < 2) return false;
  const last = base[base.length - 1].toLowerCase();
  const secondLast = base[base.length - 2].toLowerCase();
  if ('aeiou'.includes(last)) return false;
  if (!'aeiou'.includes(secondLast)) return false;
  if ('wxyz'.includes(last)) return false;
  // Only double for short (1-syllable) words or words ending in stressed syllable patterns
  // Simple heuristic: double if word is short (<=5 chars) and CVC pattern
  if (base.length <= 5) return true;
  // For longer words like "begin", "forget", "occur", "refer" — these are in IRREG with explicit ing
  return false;
}

function getVerbForms(base) {
  const irr = IRREG[base];
  const v2 = irr ? irr.v2 : addEd(base);
  const v3 = irr ? irr.v3 : addEd(base);
  const ing = (irr && irr.ing) ? irr.ing : addIng(base);
  const s = (irr && irr.s) ? irr.s : addS(base);
  const isIrregular = irr && (irr.v2 !== addEd(base) || irr.v3 !== addEd(base));
  return { base, v2, v3, ing, s, isIrregular, special: irr && irr.special };
}

// ============================================================
// BUILD CONJUGATION TABLE FOR EACH TENSE
// ============================================================
function conjugateVerb(forms) {
  const { base, v2, v3, ing, s } = forms;
  const result = {};

  // Pronouns: I, you, he/she, we, they
  // Index:     0    1      2     3     4

  // Present Simple
  if (base === 'be') {
    result.present_simple = ['am', 'are', 'is', 'are', 'are'];
  } else if (base === 'have') {
    result.present_simple = ['have', 'have', 'has', 'have', 'have'];
  } else {
    result.present_simple = [base, base, s, base, base];
  }

  // Present Continuous
  const amIsAre = ['am', 'are', 'is', 'are', 'are'];
  result.present_continuous = amIsAre.map(aux => aux + ' ' + ing);

  // Past Simple
  if (base === 'be') {
    result.past_simple = ['was', 'were', 'was', 'were', 'were'];
  } else {
    result.past_simple = [v2, v2, v2, v2, v2];
  }

  // Past Continuous
  const wasWere = ['was', 'were', 'was', 'were', 'were'];
  result.past_continuous = wasWere.map(aux => aux + ' ' + ing);

  // Present Perfect
  const haveHas = ['have', 'have', 'has', 'have', 'have'];
  result.present_perfect = haveHas.map(aux => aux + ' ' + v3);

  // Present Perfect Continuous
  result.present_perfect_continuous = haveHas.map(aux => aux + ' been ' + ing);

  // Past Perfect
  result.past_perfect = Array(5).fill('had ' + v3);

  // Past Perfect Continuous
  result.past_perfect_continuous = Array(5).fill('had been ' + ing);

  // Future Simple
  result.future_simple = Array(5).fill('will ' + base);

  // Future Continuous
  result.future_continuous = Array(5).fill('will be ' + ing);

  // Future Perfect
  result.future_perfect = Array(5).fill('will have ' + v3);

  // Future Perfect Continuous
  result.future_perfect_continuous = Array(5).fill('will have been ' + ing);

  // Conditional
  result.conditional = Array(5).fill('would ' + base);

  // Conditional Perfect
  result.conditional_perfect = Array(5).fill('would have ' + v3);

  // Imperative
  result.imperative = [base + '!'];
  if (base === 'be') result.imperative = ['be!'];

  return result;
}

// ============================================================
// CYRILLIC DETECTION
// ============================================================
function isCyrillic(str) {
  return /[а-яё]/i.test(str);
}

// ============================================================
// MAIN CONJUGATION FUNCTION
// ============================================================
function conjugate() {
  const input = document.getElementById('verbInput').value.trim().toLowerCase();
  if (!input) return;

  const resultsDiv = document.getElementById('results');
  const verbInfoDiv = document.getElementById('verbInfo');
  const legendDiv = document.getElementById('legend');
  const warningBanner = document.getElementById('warningBanner');

  resultsDiv.innerHTML = '';
  verbInfoDiv.style.display = 'none';
  verbInfoDiv.innerHTML = '';
  legendDiv.style.display = 'none';
  warningBanner.style.display = 'none';

  let verb = input;
  let ruTranslation = null;

  // Handle Cyrillic input
  if (isCyrillic(input)) {
    const found = RU_TO_EN[input];
    if (!found) {
      resultsDiv.innerHTML = '<div class="no-result">Глагол «' + input + '» не найден в словаре. Попробуйте ввести по-английски.</div>';
      return;
    }
    // Handle multi-word translations
    verb = found.split('/')[0].trim();
    ruTranslation = input;
  }

  // Strip "to " prefix if provided
  if (verb.startsWith('to ')) verb = verb.slice(3);

  // Check if verb is known
  const isKnown = !!IRREG[verb] || verb.length >= 2;

  if (!isKnown) {
    resultsDiv.innerHTML = '<div class="no-result">Введите глагол для спряжения.</div>';
    return;
  }

  // Warn if not in our database (but still conjugate)
  if (!IRREG[verb] && !PP_RU[verb]) {
    warningBanner.innerHTML = '⚠️ Глагол «' + verb + '» не найден в базе. Спряжение сгенерировано по правилам для правильных глаголов — проверьте корректность.';
    warningBanner.style.display = 'block';
  }

  const forms = getVerbForms(verb);
  const conjugation = conjugateVerb(forms);

  // Build info badges
  let badgesHTML = '';
  const groupName = forms.isIrregular ? 'неправильный (irregular)' : 'правильный (regular)';
  const groupClass = forms.isIrregular ? 'badge-aux' : 'badge-group';
  badgesHTML += '<span class="badge ' + groupClass + '">' + groupName + '</span>';
  badgesHTML += '<span class="badge badge-pp">Past Simple: ' + forms.v2 + '</span>';
  badgesHTML += '<span class="badge badge-pp">Past Participle: ' + forms.v3 + '</span>';
  badgesHTML += '<span class="badge badge-gp">Gerund: ' + forms.ing + '</span>';
  if (ruTranslation) {
    badgesHTML += '<span class="badge badge-ru">🇷🇺 ' + ruTranslation + '</span>';
  } else if (PP_RU[verb]) {
    badgesHTML += '<span class="badge badge-ru">🇷🇺 ' + PP_RU[verb] + '</span>';
  }
  verbInfoDiv.innerHTML = badgesHTML;
  verbInfoDiv.style.display = 'block';
  legendDiv.style.display = 'block';

  // Build tense cards
  let html = '';
  let lastLiterary = null;

  TENSES.forEach(function(tense) {
    if (tense.literary !== lastLiterary) {
      if (!tense.literary) {
        html += '<div class="section-label">Основные времена (Active)</div>';
      } else {
        html += '<div class="section-label literary">Редкие / книжные времена</div>';
      }
      lastLiterary = tense.literary;
    }

    const headerClass = tense.literary ? 'literary' : 'active';
    const cardClass = tense.literary ? 'tense-card literary-card' : 'tense-card';

    html += '<div class="' + cardClass + '">';
    html += '<div class="tense-header ' + headerClass + '">';
    html += '<div class="en-name">' + tense.name + '</div>';
    html += '<div class="ru-name">' + tense.ru + '</div>';
    html += '</div>';
    html += '<div class="tense-explain">' + tense.explain + '</div>';
    html += '<div class="tense-body"><table>';

    if (tense.id === 'imperative') {
      html += '<tr><td class="pronoun">(you)</td><td class="verb-form">' + conjugation.imperative[0] + '</td></tr>';
      html += '<tr><td class="pronoun">(let\'s)</td><td class="verb-form">let\'s ' + forms.base + '!</td></tr>';
      html += '<tr><td class="pronoun">(don\'t)</td><td class="verb-form">don\'t ' + forms.base + '!</td></tr>';
    } else {
      const conj = conjugation[tense.id];
      if (conj) {
        PRONOUNS.forEach(function(pronoun, i) {
          html += '<tr><td class="pronoun">' + pronoun + '</td><td class="verb-form">' + conj[i] + '</td></tr>';
        });
      }
    }

    html += '</table></div></div>';
  });

  resultsDiv.innerHTML = html;
}

function tryVerb(v) {
  document.getElementById('verbInput').value = v;
  conjugate();
}

// Auto-conjugate from URL hash
if (location.hash) {
  document.getElementById('verbInput').value = decodeURIComponent(location.hash.slice(1));
  conjugate();
}
