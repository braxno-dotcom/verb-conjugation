// GROUP LABELS
// ============================================================
function groupLabel(g) {
  if (g === 1) return 'Gruppe 1 (-et)';
  if (g === '2a') return 'Gruppe 2a (-te/-t)';
  if (g === '2b') return 'Gruppe 2b (-te/-t)';
  if (g === 3) return 'Gruppe 3 (-dde/-dd)';
  if (g === 'sterk') return 'Sterk (сильный)';
  if (g === 'ureg') return 'Uregelmessig (неправильный)';
  return g;
}

// ============================================================
function buildDefaultExamples(inf, v) {
  const ex = {};
  ex.presens = ['Jeg <b>' + v.presens + '</b>. — Я ' + v.ru.split(',')[0].trim() + '.'];
  ex.preteritum = ['Jeg <b>' + v.preteritum + '</b> i går. — Я ' + v.ru.split(',')[0].trim().replace(/ть$/, 'л') + ' вчера.'];
  ex.perfektum = ['Jeg <b>har ' + v.pp + '</b>. — Я ' + v.ru.split(',')[0].trim().replace(/ть$/, 'л') + '.'];
  ex.futurum = ['Jeg <b>skal ' + inf + '</b>. — Я буду ' + v.ru.split(',')[0].trim().replace(/ть$/, '') + 'ть.'];
  if (v.imperativ) {
    ex.imperativ = ['<b>' + v.imperativ.charAt(0).toUpperCase() + v.imperativ.slice(1) + '</b>! — ' + v.ru.split(',')[0].trim().replace(/ть$/, 'й') + '!'];
  }
  return ex;
}

function tryVerb(v) {
  document.getElementById('verbInput').value = v;
  conjugate();
}

function conjugate() {
  const input = document.getElementById('verbInput').value.trim();
  const resultsDiv = document.getElementById('results');
  const verbInfoDiv = document.getElementById('verbInfo');
  const warningBanner = document.getElementById('warningBanner');

  if (!input) {
    resultsDiv.innerHTML = '';
    verbInfoDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  // Check if input is Russian
  let russianInput = null;
  let norwegianVerb = input.toLowerCase().trim();
  if (/[а-яё]/i.test(input)) {
    const lowerInput = input.toLowerCase().trim();
    if (RU_TO_NO[lowerInput]) {
      russianInput = lowerInput;
      norwegianVerb = RU_TO_NO[lowerInput];
    } else {
      resultsDiv.innerHTML = '<div class="no-result">Русский глагол \u00ab' + input + '\u00bb не найден в словаре.<br>Попробуйте ввести норвежский инфинитив (например: snakke, skrive, v\u00e6re)</div>';
      verbInfoDiv.style.display = 'none';
      warningBanner.style.display = 'none';
      return;
    }
  }

  // Strip leading "å " if user typed it
  norwegianVerb = norwegianVerb.replace(/^\u00e5\s+/, '');

  const v = VERBS[norwegianVerb];
  if (!v) {
    resultsDiv.innerHTML = '<div class="no-result">Глагол \u00ab' + norwegianVerb + '\u00bb не найден в базе.<br>Попробуйте ввести инфинитив без \u00ab\u00e5\u00bb (например: snakke, skrive, v\u00e6re)</div>';
    verbInfoDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  warningBanner.style.display = 'none';

  // Show verb info badges
  verbInfoDiv.style.display = 'block';
  let infoHTML = '';
  if (russianInput) {
    infoHTML += '<span class="badge badge-ru">&#128270; русский \u2192 norsk: ' + russianInput + ' \u2192 ' + norwegianVerb + '</span>';
  }
  infoHTML += '<span class="badge badge-group">' + groupLabel(v.group) + '</span>';
  infoHTML += '<span class="badge badge-ru">\ud83c\uddf7\ud83c\uddfa ' + v.ru + '</span>';
  infoHTML += '<span class="badge badge-pp">Perfektum partisipp: ' + v.pp + '</span>';
  if (v.prp) {
    infoHTML += '<span class="badge badge-prp">Presens partisipp: ' + v.prp + '</span>';
  }
  verbInfoDiv.innerHTML = infoHTML;

  // Get examples
  const ex = EXAMPLES[norwegianVerb] || buildDefaultExamples(norwegianVerb, v);

  const PRONOUNS = ['jeg', 'du', 'han / hun', 'vi', 'dere', 'de'];
  const PRONOUNS_RU = ['я', 'ты', 'он / она', 'мы', 'вы', 'они'];

  // Build tense cards
  let html = '';

  for (const tense of TENSES) {
    let form = '';
    let examples = [];
    let isImperativ = false;
    let isInfinitiv = false;

    if (tense.id === 'infinitiv') {
      form = 'å ' + norwegianVerb;
      isInfinitiv = true;
      examples = ['Han liker <b>å ' + norwegianVerb + '</b>. — Он любит ' + v.ru.split(',')[0].trim() + '.'];
    } else if (tense.id === 'presens') {
      form = v.presens;
      examples = ex.presens || [];
    } else if (tense.id === 'preteritum') {
      form = v.preteritum;
      examples = ex.preteritum || [];
    } else if (tense.id === 'presens_perfektum') {
      form = 'har ' + v.pp;
      examples = ex.perfektum || [];
    } else if (tense.id === 'pluskvamperfektum') {
      form = 'hadde ' + v.pp;
      examples = [];
    } else if (tense.id === 'futurum') {
      form = 'skal ' + norwegianVerb;
      examples = ex.futurum || [];
      examples = examples.concat(['<i>Также: vil ' + norwegianVerb + ' (хочу/буду ' + v.ru.split(',')[0].trim() + ')</i>']);
    } else if (tense.id === 'imperativ') {
      isImperativ = true;
      if (!v.imperativ) {
        form = null;
      } else {
        form = v.imperativ + '!';
        examples = ex.imperativ || [];
      }
    }

    // Build Russian translation for this tense
    let ruForm = v.ru.split(',')[0].trim();
    let ruTenseLabel = '';
    if (tense.id === 'infinitiv') ruTenseLabel = ruForm;
    else if (tense.id === 'presens') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'ю(сь)' : 'ю'));
    else if (tense.id === 'preteritum') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
    else if (tense.id === 'presens_perfektum') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
    else if (tense.id === 'pluskvamperfektum') ruTenseLabel = 'уже ' + ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'л(ся)' : 'л'));
    else if (tense.id === 'futurum') ruTenseLabel = 'буду ' + ruForm;
    else if (tense.id === 'imperativ') ruTenseLabel = ruForm.replace(/ть(ся)?$/, (m, s) => (s ? 'й(ся)' : 'й')) + '!';

    html += '<div class="tense-card">';
    html += '<div class="tense-header">';
    html += '<div class="no-name">' + tense.name + '<span class="ru-translation">' + ruTenseLabel + '</span></div>';
    html += '<div class="ru-name">' + tense.ru + '</div>';
    html += '</div>';
    html += '<div class="tense-explain">' + tense.explain + '</div>';
    html += '<div class="tense-body">';

    if (form === null) {
      html += '<div style="color:#ccc;padding:8px 0;">Не употребляется для этого глагола</div>';
    } else if (isInfinitiv) {
      html += '<table><tr><td class="verb-form">' + form + '</td><td class="pronoun" style="text-align:right">' + v.ru + '</td></tr></table>';
      for (const e of examples) { html += '<div class="example">' + e + '</div>'; }
    } else if (isImperativ) {
      html += '<table><tr><td class="verb-form">' + form + '</td></tr></table>';
      for (const e of examples) { html += '<div class="example">' + e + '</div>'; }
    } else {
      html += '<table>';
      for (let i = 0; i < 6; i++) {
        html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + form + '</td><td class="pronoun" style="text-align:right;width:auto;">' + PRONOUNS_RU[i] + '</td></tr>';
      }
      html += '</table>';
      if (examples.length > 0) {
        html += '<div class="example">';
        for (const e of examples) { html += e + '<br>'; }
        html += '</div>';
      }
    }

    html += '</div></div>';
  }

  resultsDiv.innerHTML = html;
}

// Auto-conjugate if there's a hash
if (location.hash) {
  document.getElementById('verbInput').value = decodeURIComponent(location.hash.slice(1));
  conjugate();
}
</script>
