</div>

  <span onclick="tryVerb('hablar')">hablar</span>,

<div id="results"></div>

// ============================================================
// REGULAR CONJUGATION ENGINE
// ============================================================

function getGroup(inf) {
  if (inf.endsWith('ar')) return 1;
  if (inf.endsWith('er')) return 2;
  if (inf.endsWith('ir')) return 3;
  return 0;
}

function regularConjugation(inf) {
  const g = getGroup(inf);
  if (!g) return null;
  const stem = inf.slice(0, -2);
  const r = { group: g === 1 ? '1-я группа (-ar)' : g === 2 ? '2-я группа (-er)' : '3-я группа (-ir)' };

  if (g === 1) {
    r.pp = stem + 'ado'; r.prp = stem + 'ando';
    r.presente = [stem+'o', stem+'as', stem+'a', stem+'amos', stem+'áis', stem+'an'];
    r.preterito_indefinido = [stem+'é', stem+'aste', stem+'ó', stem+'amos', stem+'asteis', stem+'aron'];
    r.preterito_imperfecto = [stem+'aba', stem+'abas', stem+'aba', stem+'ábamos', stem+'abais', stem+'aban'];
    r.futuro_simple = [inf+'é', inf+'ás', inf+'á', inf+'emos', inf+'éis', inf+'án'];
    r.condicional_simple = [inf+'ía', inf+'ías', inf+'ía', inf+'íamos', inf+'íais', inf+'ían'];
    r.subjuntivo_presente = [stem+'e', stem+'es', stem+'e', stem+'emos', stem+'éis', stem+'en'];
    r.subjuntivo_imperfecto = [stem+'ara', stem+'aras', stem+'ara', stem+'áramos', stem+'arais', stem+'aran'];
    r.imperativo_afirmativo = [stem+'a', stem+'e', stem+'emos', stem+'ad', stem+'en'];
    r.futuro_subjuntivo = [stem+'are', stem+'ares', stem+'are', stem+'áremos', stem+'areis', stem+'aren'];
  } else if (g === 2) {
    r.pp = stem + 'ido'; r.prp = stem + 'iendo';
    r.presente = [stem+'o', stem+'es', stem+'e', stem+'emos', stem+'éis', stem+'en'];
    r.preterito_indefinido = [stem+'í', stem+'iste', stem+'ió', stem+'imos', stem+'isteis', stem+'ieron'];
    r.preterito_imperfecto = [stem+'ía', stem+'ías', stem+'ía', stem+'íamos', stem+'íais', stem+'ían'];
    r.futuro_simple = [inf+'é', inf+'ás', inf+'á', inf+'emos', inf+'éis', inf+'án'];
    r.condicional_simple = [inf+'ía', inf+'ías', inf+'ía', inf+'íamos', inf+'íais', inf+'ían'];
    r.subjuntivo_presente = [stem+'a', stem+'as', stem+'a', stem+'amos', stem+'áis', stem+'an'];
    r.subjuntivo_imperfecto = [stem+'iera', stem+'ieras', stem+'iera', stem+'iéramos', stem+'ierais', stem+'ieran'];
    r.imperativo_afirmativo = [stem+'e', stem+'a', stem+'amos', stem+'ed', stem+'an'];
    r.futuro_subjuntivo = [stem+'iere', stem+'ieres', stem+'iere', stem+'iéremos', stem+'iereis', stem+'ieren'];
  } else {
    r.pp = stem + 'ido'; r.prp = stem + 'iendo';
    r.presente = [stem+'o', stem+'es', stem+'e', stem+'imos', stem+'ís', stem+'en'];
    r.preterito_indefinido = [stem+'í', stem+'iste', stem+'ió', stem+'imos', stem+'isteis', stem+'ieron'];
    r.preterito_imperfecto = [stem+'ía', stem+'ías', stem+'ía', stem+'íamos', stem+'íais', stem+'ían'];
    r.futuro_simple = [inf+'é', inf+'ás', inf+'á', inf+'emos', inf+'éis', inf+'án'];
    r.condicional_simple = [inf+'ía', inf+'ías', inf+'ía', inf+'íamos', inf+'íais', inf+'ían'];
    r.subjuntivo_presente = [stem+'a', stem+'as', stem+'a', stem+'amos', stem+'áis', stem+'an'];
    r.subjuntivo_imperfecto = [stem+'iera', stem+'ieras', stem+'iera', stem+'iéramos', stem+'ierais', stem+'ieran'];
    r.imperativo_afirmativo = [stem+'e', stem+'a', stem+'amos', stem+'id', stem+'an'];
    r.futuro_subjuntivo = [stem+'iere', stem+'ieres', stem+'iere', stem+'iéremos', stem+'iereis', stem+'ieren'];
  }
  return r;
}

// ============================================================
// PP / PRP TRANSLATIONS
// ============================================================
const PP_RU = {
  'hablado':'сказанный/говорённый','comido':'съеденный','vivido':'прожитый',
  'sido':'бывший','estado':'бывший (в состоянии)','habido':'имевший',
  'tenido':'имевший','ido':'ушедший','hecho':'сделанный','dicho':'сказанный',
  'podido':'смогший','querido':'желанный/любимый','sabido':'узнанный',
  'puesto':'поставленный','venido':'пришедший','salido':'вышедший',
  'dado':'данный','visto':'увиденный','conocido':'узнанный',
  'dormido':'уснувший','pedido':'попрошенный','sentido':'почувствованный',
  'pensado':'обдуманный','vuelto':'вернувшийся','encontrado':'найденный',
  'escrito':'написанный','abierto':'открытый','muerto':'умерший',
  'traído':'принесённый','caído':'упавший','creído':'поверивший',
  'leído':'прочитанный','oído':'услышанный','conducido':'ведённый',
  'seguido':'следовавший','jugado':'сыгранный','comenzado':'начатый',
  'roto':'сломанный','cubierto':'покрытый','resuelto':'решённый'
};
const PRP_RU = {
  'hablando':'говоря','comiendo':'съедая','viviendo':'живя',
  'siendo':'будучи','estando':'находясь','habiendo':'имея',
  'teniendo':'имея','yendo':'идя','haciendo':'делая','diciendo':'говоря',
  'pudiendo':'имея возможность','queriendo':'желая','sabiendo':'зная',
  'poniendo':'ставя','viniendo':'приходя','saliendo':'выходя',
  'dando':'давая','viendo':'видя','conociendo':'узнавая',
  'durmiendo':'спя','pidiendo':'прося','sintiendo':'чувствуя',
  'pensando':'думая','volviendo':'возвращаясь','encontrando':'находя',
  'escribiendo':'пиша','abriendo':'открывая','muriendo':'умирая',
  'trayendo':'принося','cayendo':'падая','creyendo':'веря',
  'leyendo':'читая','oyendo':'слыша','conduciendo':'ведя',
  'siguiendo':'следуя','jugando':'играя','comenzando':'начиная'
};

function translatePP(pp) {
  if (PP_RU[pp]) return PP_RU[pp];
  if (pp.endsWith('ado')) return 'сделанный/-анный';
  if (pp.endsWith('ido')) return 'сделавший/-ённый';
  return '—';
}
function translatePRP(prp) {
  if (!prp) return '—';
  if (PRP_RU[prp]) return PRP_RU[prp];
  return 'делая (действие в процессе)';
}

// ============================================================
// COMPOUND TENSE BUILDER
// ============================================================
function getHaberForms(tenseId) {
  const h = IRREG['haber'];
  return h[tenseId] || null;
}

function buildCompound(auxForms, pp) {
  if (!auxForms) return null;
  return auxForms.map(f => f + ' ' + pp);
}

// ============================================================
// NEGATIVE IMPERATIVE (uses subjuntivo presente with "no")
// ============================================================
function buildNegativeImperative(subjPres) {
  if (!subjPres) return null;
  // tú, Ud., nosotros, vosotros, Uds. → indices 1,2,3,4,5 of subjuntivo (skip yo)
  return [
    'no ' + subjPres[1],
    'no ' + subjPres[2],
    'no ' + subjPres[3],
    'no ' + subjPres[4],
    'no ' + subjPres[5]
  ];
}

// ============================================================
// MAIN CONJUGATION FUNCTION
// ============================================================
function getConjugation(infinitive) {
  const verb = infinitive.trim().toLowerCase();
  let irr = IRREG[verb];
  let reg = regularConjugation(verb);

  if (!irr && !reg) return null;

  // Merge: irregular overrides regular
  const data = {};
  if (reg) Object.assign(data, reg);
  if (irr) {
    for (const k of Object.keys(irr)) {
      if (irr[k] !== undefined) data[k] = irr[k];
    }
  }

  const pp = data.pp;
  const prp = data.prp;

  const result = {
    infinitive: verb,
    group: data.group || '—',
    isKnown: !!irr,
    pp: pp,
    pp_ru: data.pp_ru || translatePP(pp),
    prp: prp,
    prp_ru: data.prp_ru || translatePRP(prp),
    tenses: {}
  };

  for (const tense of TENSES) {
    if (tense.isNote) continue;

    if (tense.compound) {
      const auxForms = getHaberForms(tense.auxTense);
      result.tenses[tense.id] = buildCompound(auxForms, pp);
    } else if (tense.id === 'imperativo_negativo') {
      const subjPres = data.subjuntivo_presente;
      result.tenses[tense.id] = buildNegativeImperative(subjPres);
    } else {
      result.tenses[tense.id] = data[tense.id] || null;
    }
  }

  return result;
}

// ============================================================
// UI
// ============================================================
function tryVerb(v) {
  document.getElementById('verbInput').value = v;
  conjugate();
}

function conjugate() {
  const input = document.getElementById('verbInput').value.trim();
  const resultsDiv = document.getElementById('results');
  const verbInfoDiv = document.getElementById('verbInfo');
  const legendDiv = document.getElementById('legend');
  const warningBanner = document.getElementById('warningBanner');

  if (!input) {
    resultsDiv.innerHTML = '';
    verbInfoDiv.style.display = 'none';
    legendDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  const conj = getConjugation(input);
  if (!conj) {
    resultsDiv.innerHTML = '<div class="no-result">Глагол «' + input + '» не найден.<br>Попробуйте ввести инфинитив (например: hablar, comer, vivir)</div>';
    verbInfoDiv.style.display = 'none';
    legendDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  // Warning for unknown verbs
  if (!conj.isKnown) {
    warningBanner.style.display = 'block';
    warningBanner.innerHTML = '&#9888; Глагол <b>' + conj.infinitive + '</b> не найден в базе неправильных глаголов — спряжение построено по правилам группы. Если глагол неправильный, формы могут быть неточными.';
  } else {
    warningBanner.style.display = 'none';
  }

  verbInfoDiv.style.display = 'block';
  legendDiv.style.display = 'block';
  verbInfoDiv.innerHTML =
    '<span class="badge badge-group">' + conj.group + '</span>' +
    '<span class="badge badge-aux">Вспомогательный: haber</span>' +
    '<span class="badge badge-pp">Причастие (participio pasado): ' + conj.pp + ' <i style="opacity:0.7">(«' + conj.pp_ru + '»)</i></span>' +
    '<span class="badge badge-gp">Деепричастие (gerundio): ' + conj.prp + ' <i style="opacity:0.7">(«' + conj.prp_ru + '»)</i></span>';

  let html = '';
  let prevLiterary = null;

  for (const tense of TENSES) {
    if (tense.isNote) continue;

    if (prevLiterary === null && !tense.literary) {
      html += '<div class="section-label">Употребительные времена</div>';
    }
    if (!prevLiterary && tense.literary && prevLiterary !== null) {
      html += '<div class="section-label literary">Книжные / архаичные времена</div>';
    }
    prevLiterary = tense.literary;

    const forms = conj.tenses[tense.id];
    const headerClass = tense.literary ? 'literary' : 'active';
    const cardClass = tense.literary ? 'tense-card literary-card' : 'tense-card';
    const isImp = tense.isImperative;

    html += '<div class="' + cardClass + '">';
    html += '<div class="tense-header ' + headerClass + '">';
    html += '<div class="fr-name">' + tense.name + '</div>';
    html += '<div class="ru-name">' + tense.ru + '</div>';
    html += '</div>';
    html += '<div class="tense-explain">' + tense.explain + '</div>';
    html += '<div class="tense-body">';

    if (!forms) {
      html += '<div style="color:#ccc;padding:8px 0;">Не употребляется для этого глагола</div>';
    } else if (isImp) {
      const labels = tense.id === 'imperativo_negativo' ? IMP_PRONOUNS_NEG : IMP_PRONOUNS_AF;
      html += '<table>';
      for (let i = 0; i < forms.length; i++) {
        html += '<tr><td class="pronoun">' + labels[i] + '</td><td class="verb-form">' + forms[i] + '</td></tr>';
      }
      html += '</table>';
    } else {
      html += '<table>';
      for (let i = 0; i < 6; i++) {
        html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + (forms[i] || '—') + '</td></tr>';
      }
      html += '</table>';
    }

    html += '</div></div>';
  }

  resultsDiv.innerHTML = html;
}

if (location.hash) {
  document.getElementById('verbInput').value = decodeURIComponent(location.hash.slice(1));
  conjugate();
}
