<style>

  header {

  header p { margin-top: 6px; opacity: 0.85; font-size: 0.95em; }
  .lang-switch {
    position: absolute;
    top: 16px;
    right: 20px;
    background: rgba(255,255,255,0.15);
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.95em;
    transition: background 0.2s;
  }
  .lang-switch:hover { background: rgba(255,255,255,0.3); }
  header { position: relative; }

  .search-area {
    max-width: 600px;
    margin: 30px auto 10px;
    padding: 0 20px;
    display: flex;
    gap: 10px;
  }
  .search-area input {
    flex: 1;
    padding: 14px 18px;
    font-size: 1.15em;
    border: 2px solid #c8bfb6;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-area input:focus { border-color: #2a4a7f; }
  .search-area button {
    padding: 14px 28px;
    font-size: 1.05em;
    background: #2a4a7f;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  .search-area button:hover { background: #1a365d; }

  .hint {
    max-width: 600px;
    margin: 8px auto 0;
    padding: 0 20px;
    font-size: 0.85em;
    color: #888;
  }
  .hint span { cursor: pointer; color: #2a4a7f; text-decoration: underline; }
  .hint span:hover { color: #1a365d; }

  .verb-info {
    max-width: 900px;
    margin: 18px auto 8px;
    padding: 0 20px;
    display: none;
  }
  .verb-info .badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 0.9em;
    font-weight: 600;
    margin-right: 8px;
  }
  .badge-group { background: #e0ecff; color: #1a365d; }
  .badge-aux { background: #fce4ec; color: #880e4f; }
  .badge-pp { background: #e8f5e9; color: #1b5e20; }
  .badge-gp { background: #fff3e0; color: #e65100; }

    padding: 0 20px;
    display: none;

    color: #666;

  .dot-active { background: #2a4a7f; }
  .dot-literary { background: #9e9e9e; }

    max-width: 900px;
    margin: 10px auto 40px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));

  .tense-header.literary { background: #9e9e9e; }

  .tense-header .ru-name { font-size: 0.85em; opacity: 0.9; margin-top: 2px; }
  .tense-explain {
    padding: 8px 16px;
    font-size: 0.88em;
    color: #666;
    background: #fafafa;
    border-bottom: 1px solid #eee;

    display: none;

    font-size: 1.1em;

<body>

<header>
  <a href="spanish-verbs.html" class="lang-switch">🇪🇸 Испанский</a>
  <h1>🇫🇷 Спряжение французских глаголов</h1>
  <p>Введите глагол в инфинитиве — получите все времена с объяснениями на русском</p>
</header>

<div class="search-area">
  <input type="text" id="verbInput" placeholder="например: parler, être, aller..." autofocus
    onkeydown="if(event.key==='Enter')conjugate()">
  <button onclick="conjugate()">Спрягать</button>
</div>
<div class="hint">
  Попробуйте:
  <span onclick="tryVerb('parler')">parler</span>,
  <span onclick="tryVerb('être')">être</span>,
  <span onclick="tryVerb('avoir')">avoir</span>,
  <span onclick="tryVerb('aller')">aller</span>,
  <span onclick="tryVerb('faire')">faire</span>,
  <span onclick="tryVerb('pouvoir')">pouvoir</span>,
  <span onclick="tryVerb('venir')">venir</span>,
  <span onclick="tryVerb('prendre')">prendre</span>,
  <span onclick="tryVerb('finir')">finir</span>,
  <span onclick="tryVerb('vendre')">vendre</span>
</div>

<div class="warning-banner" id="warningBanner"></div>
<div class="verb-info" id="verbInfo"></div>
<div class="legend" id="legend">
  <div class="legend-inner">
    <div class="legend-item"><div class="legend-dot dot-active"></div> Используется в речи</div>
    <div class="legend-item"><div class="legend-dot dot-literary"></div> Книжное (только в литературе)</div>
  </div>
</div>

<div id="results"></div>

function getGroup(infinitive) {
  if (infinitive.endsWith('er')) return 1;
  if (infinitive.endsWith('ir')) return 2;
  if (infinitive.endsWith('re')) return 3;
  return 0;
}

  const group = getGroup(infinitive);
  if (group === 0) return null;

  result.group = group === 1 ? '1-я группа (-er)' : group === 2 ? '2-я группа (-ir)' : '3-я группа (-re)';

    stem = infinitive.slice(0, -2);
    result.pp = stem + 'é';
    result.prp = stem + 'ant';

    result.imperatif = [stem+'e', stem+'ons', stem+'ez'];
  } else if (group === 2) {
    stem = infinitive.slice(0, -2);
    result.pp = stem + 'i';
    result.prp = stem + 'issant';
    result.present = [stem+'is', stem+'is', stem+'it', stem+'issons', stem+'issez', stem+'issent'];

    result.futur_simple = [futurStem+'ai', futurStem+'as', futurStem+'a', futurStem+'ons', futurStem+'ez', futurStem+'ont'];
    result.conditionnel_present = [futurStem+'ais', futurStem+'ais', futurStem+'ait', futurStem+'ions', futurStem+'iez', futurStem+'aient'];
    result.subjonctif_present = [stem+'e', stem+'es', stem+'e', stem+'ions', stem+'iez', stem+'ent'];
    result.passe_simple = [stem+'is', stem+'is', stem+'it', stem+'îmes', stem+'îtes', stem+'irent'];
    result.subjonctif_imparfait = [stem+'isse', stem+'isses', stem+'ît', stem+'issions', stem+'issiez', stem+'issent'];
    result.imperatif = [stem+'s', stem+'ons', stem+'ez'];
  }

  return result;
}

// ============================================================
// DERIVED VERB BUILDER
// ============================================================
function buildDerived(infinitive, info) {
  const baseData = IRREG[info.base];
  if (!baseData) return null;

  const result = {};
  result.group = baseData.group + ' (как ' + info.base + ')';
  result.aux = info.aux || baseData.aux;

  // For simple prefix-based derivation
  const baseInf = info.base;

  function deriveForm(form) {
    // Simple prefix: prepend the prefix to the full base form
    // e.g. ob + tiens = obtiens, com + prends = comprends
    return info.prefix + form;
  }

  // Simple tenses
  const simpleTenses = ['present','imparfait','futur_simple','conditionnel_present',
    'subjonctif_present','passe_simple','subjonctif_imparfait'];

  for (const t of simpleTenses) {
    if (baseData[t]) {
      result[t] = baseData[t].map(f => deriveForm(f));
    }
  }

  if (baseData.imperatif) {
    result.imperatif = baseData.imperatif.map(f => deriveForm(f));
  } else {
    result.imperatif = null;
  }

  // Past participle and present participle
  result.pp = deriveForm(baseData.pp);
  result.prp = deriveForm(baseData.prp);

  return result;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ============================================================
// COMPOUND TENSE BUILDER
// ============================================================
function getAuxForms(aux, tenseId) {
  const auxData = IRREG[aux];
  if (!auxData) return null;
  return auxData[tenseId] || null;
}

function buildCompoundForms(auxForms, pp, isEtre) {
  if (!auxForms) return null;
  return auxForms.map((f, i) => {
    const suffix = isEtre ? (i >= 4 ? '(s)' : '') : '';
    return f + ' ' + pp + suffix;
  });
}

// ============================================================
// RUSSIAN TRANSLATIONS FOR PP / PRP
// ============================================================
const PP_TRANSLATIONS = {
  'été': 'бывший', 'eu': 'имевший', 'allé': 'ушедший/пошедший',
  'fait': 'сделанный', 'pu': 'смогший', 'voulu': 'захотевший',
  'dû': 'должный/обязанный', 'su': 'узнавший', 'vu': 'увиденный',
  'pris': 'взятый', 'mis': 'положенный', 'dit': 'сказанный',
  'venu': 'пришедший', 'tenu': 'держанный', 'parti': 'уехавший',
  'sorti': 'вышедший', 'dormi': 'спавший', 'connu': 'узнанный/знакомый',
  'cru': 'поверивший', 'bu': 'выпитый', 'écrit': 'написанный',
  'lu': 'прочитанный', 'vécu': 'проживший', 'suivi': 'следовавший',
  'reçu': 'полученный', 'mort': 'умерший', 'né': 'родившийся',
  'couru': 'бежавший', 'ouvert': 'открытый', 'conduit': 'ведённый',
  'craint': 'испуганный', 'plu': 'понравившийся', 'ri': 'смеявшийся',
  'battu': 'битый', 'envoyé': 'отправленный', 'appelé': 'названный/позванный',
  'acheté': 'купленный'
};

const PRP_TRANSLATIONS = {
  'étant': 'будучи', 'ayant': 'имея', 'allant': 'идя',
  'faisant': 'делая', 'pouvant': 'имея возможность', 'voulant': 'желая',
  'devant': 'будучи должным', 'sachant': 'зная', 'voyant': 'видя',
  'prenant': 'беря', 'mettant': 'кладя', 'disant': 'говоря',
  'venant': 'приходя', 'tenant': 'держа', 'partant': 'уезжая',
  'sortant': 'выходя', 'dormant': 'спя', 'connaissant': 'зная',
  'croyant': 'веря', 'buvant': 'выпивая', 'écrivant': 'пиша/записывая',
  'lisant': 'читая', 'vivant': 'живя', 'suivant': 'следуя',
  'recevant': 'получая', 'mourant': 'умирая', 'naissant': 'рождаясь',
  'courant': 'бегая', 'ouvrant': 'открывая', 'conduisant': 'ведя',
  'craignant': 'боясь', 'plaisant': 'нравясь', 'riant': 'смеясь',
  'battant': 'бьюсь/бия', 'envoyant': 'отправляя', 'appelant': 'зовя',
  'achetant': 'покупая'
};

function translatePP(verb, pp) {
  if (PP_TRANSLATIONS[pp]) return PP_TRANSLATIONS[pp];
  // Generate a rough translation for regular verbs
  if (pp.endsWith('é')) return 'сделавший/-анный';
  if (pp.endsWith('i')) return 'сделавший/-ённый';
  if (pp.endsWith('u')) return 'сделавший/-тый';
  if (pp.endsWith('t')) return 'сделавший/-тый';
  if (pp.endsWith('s')) return 'сделавший/-тый';
  return '—';
}

function translatePRP(verb, prp) {
  if (!prp) return '—';
  if (PRP_TRANSLATIONS[prp]) return PRP_TRANSLATIONS[prp];
  return 'делая (действие в процессе)';
}

// ============================================================
// MAIN CONJUGATION FUNCTION
// ============================================================
function getConjugation(infinitive) {
  const verb = infinitive.trim().toLowerCase();
  let data = null;

  let isKnown = false;

  // Check irregular verbs first
  if (IRREG[verb]) {
    data = { ...IRREG[verb] };
    isKnown = true;
  }
  // Check derived verbs
  else if (DERIVED[verb]) {
    data = buildDerived(verb, DERIVED[verb]);
    isKnown = true;
  }
  // Regular conjugation
  else {
    data = regularConjugation(verb);
  }

  if (!data) return null;

  // Determine auxiliary
  const aux = data.aux || (ETRE_VERBS.has(verb) ? 'être' : 'avoir');
  const isEtre = aux === 'être';
  const pp = data.pp;

  // Build all tenses
  const result = {
    infinitive: verb,
    group: data.group,
    auxiliary: aux,
    isKnown: isKnown,
    pp: pp,
    pp_ru: translatePP(verb, pp),
    prp: data.prp,
    prp_ru: translatePRP(verb, data.prp),
    tenses: {}
  };

  for (const tense of TENSES) {
    if (tense.compound) {
      // Build compound tense
      const auxTenseId = tense.auxTense;
      const auxForms = getAuxForms(aux, auxTenseId);
      if (auxForms) {
        if (tense.id === 'subjonctif_pqp') {
          // Subjonctif plus-que-parfait uses subjonctif_imparfait of auxiliary
          const auxSubjImp = getAuxForms(aux, 'subjonctif_imparfait');
          result.tenses[tense.id] = buildCompoundForms(auxSubjImp, pp, isEtre);
        } else {
          result.tenses[tense.id] = buildCompoundForms(auxForms, pp, isEtre);
        }
      }
    } else if (tense.id === 'imperatif') {
      result.tenses[tense.id] = data.imperatif || null;
    } else {
      result.tenses[tense.id] = data[tense.id] || null;
    }
  }

  return result;
}

// ============================================================
// ELISION: je -> j' before vowel/h
// ============================================================
function elide(pronoun, form) {
  if (pronoun !== 'je') return pronoun;
  const first = form.charAt(0).toLowerCase();
  if ('aeéèêiîoôuûyh'.includes(first)) return "j'";
  return 'je';
}

// ============================================================
// UI
// ============================================================
function tryVerb(v) {
  document.getElementById('verbInput').value = v;
  conjugate();
}

function conjugate() {
  const input = document.getElementById('verbInput').value.trim();
  const resultsDiv = document.getElementById('results');
  const verbInfoDiv = document.getElementById('verbInfo');
  const legendDiv = document.getElementById('legend');
  const warningBanner = document.getElementById('warningBanner');

  if (!input) {
    resultsDiv.innerHTML = '';
    verbInfoDiv.style.display = 'none';
    legendDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  const conj = getConjugation(input);
  if (!conj) {
    resultsDiv.innerHTML = '<div class="no-result">Глагол «' + input + '» не найден.<br>Попробуйте ввести инфинитив (например: parler, finir, vendre)</div>';
    verbInfoDiv.style.display = 'none';
    legendDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    return;
  }

  // Warning for unknown verbs (regular fallback)
  if (!conj.isKnown) {
    warningBanner.style.display = 'block';
    warningBanner.innerHTML = '&#9888; Глагол <b>' + conj.infinitive + '</b> не найден в базе неправильных глаголов — спряжение построено по правилам группы. Если глагол неправильный, формы могут быть неточными.';
  } else {
    warningBanner.style.display = 'none';
  }

  // Show verb info
  verbInfoDiv.style.display = 'block';
  legendDiv.style.display = 'block';
  verbInfoDiv.innerHTML =
    '<span class="badge badge-group">' + conj.group + '</span>' +
    '<span class="badge badge-aux">Вспомогательный: ' + conj.auxiliary + '</span>' +
    '<span class="badge badge-pp">Причастие (participe passé): ' + conj.pp + ' <i style="opacity:0.7">(«' + conj.pp_ru + '»)</i></span>' +
    '<span class="badge badge-gp">Деепричастие (participe présent): ' + conj.prp + ' <i style="opacity:0.7">(«' + conj.prp_ru + '»)</i></span>';

  // Build tense cards
  let html = '';
  let prevLiterary = false;

  for (const tense of TENSES) {
    // Section labels
    if (!prevLiterary && tense.literary) {
      html += '<div class="section-label literary">Книжные времена (не используются в речи)</div>';
    }
    if (prevLiterary === false && tense === TENSES[0]) {
      html += '<div class="section-label">Употребительные времена</div>';
    }
    prevLiterary = tense.literary;

    const forms = conj.tenses[tense.id];
    const headerClass = tense.literary ? 'literary' : 'active';
    const cardClass = tense.literary ? 'tense-card literary-card' : 'tense-card';

    html += '<div class="' + cardClass + '">';
    html += '<div class="tense-header ' + headerClass + '">';
    html += '<div class="fr-name">' + tense.name + '</div>';
    html += '<div class="ru-name">' + tense.ru + '</div>';
    html += '</div>';
    html += '<div class="tense-explain">' + tense.explain + '</div>';
    html += '<div class="tense-body">';

    if (!forms) {
      html += '<div style="color:#ccc;padding:8px 0;">Не употребляется для этого глагола</div>';
    } else if (tense.id === 'imperatif') {
      html += '<table>';
      for (let i = 0; i < forms.length; i++) {
        html += '<tr><td class="pronoun">' + IMP_PRONOUNS[i] + '</td><td class="verb-form">' + forms[i] + '</td></tr>';
      }
      html += '</table>';
    } else {
      html += '<table>';
      for (let i = 0; i < 6; i++) {
        const form = forms[i] || '—';
        const pron = elide(PRONOUNS[i].split(' ')[0], form);
        const fullPron = PRONOUNS[i].replace(/^[^ ]+/, pron);
        html += '<tr><td class="pronoun">' + fullPron + '</td><td class="verb-form">' + form + '</td></tr>';
      }
      html += '</table>';
    }

    html += '</div></div>';
  }

  resultsDiv.innerHTML = html;
}

// Auto-conjugate if there's a hash
if (location.hash) {
  document.getElementById('verbInput').value = decodeURIComponent(location.hash.slice(1));
  conjugate();
}
</script>
