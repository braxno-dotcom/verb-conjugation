// ===================== HELPERS =====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickWrong(correct, pool, n) {
  const unique = [...new Set(pool.filter(x => x !== correct))];
  return shuffle(unique).slice(0, n);
}
function mkQ(type, sentence, hint, correct, distractors, explanation) {
  const opts = shuffle([correct, ...distractors]);
  return { type, sentence, hint, options: opts, correct, explanation };
}

const topic2 = verbQuestions.concat(moreVerbQs);
const topic3 = nounQuestions;
const topic4 = prepositionQuestions;
const topic5 = wordOrderQuestions;

// ===================== APP STATE =====================
const TOPICS = [
  { id: "articles", label: "🔤 Артикли и падежи" },
  { id: "verbs", label: "📝 Спряжение глаголов" },
  { id: "nouns", label: "📊 Сущ.: род и мн.ч." },
  { id: "prepositions", label: "📍 Предлоги" },
  { id: "wordorder", label: "🔀 Порядок слов" },
  { id: "all", label: "Все темы сразу" },
];

let currentTopic = "all";
let questions = [];
let qIndex = 0;
let score = { correct: 0, total: 0, streak: 0, maxStreak: 0 };
let answered = false;

function init() {
  renderTopics();
  loadScore();
  buildQuestions();
  showQuestion();
  document.addEventListener("keydown", handleKey);
}

function renderTopics() {
  const el = document.getElementById("topics");
  el.innerHTML = TOPICS.map(t =>
    `<button class="topic-btn${t.id === currentTopic ? ' active' : ''}" data-topic="${t.id}">${t.label}</button>`
  ).join("");
  el.querySelectorAll(".topic-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentTopic = btn.dataset.topic;
      renderTopics();
      buildQuestions();
      showQuestion();
    });
  });
}

function buildQuestions() {
  let pool = [];
  if (currentTopic === "articles" || currentTopic === "all") pool = pool.concat(topic1);
  if (currentTopic === "verbs" || currentTopic === "all") pool = pool.concat(topic2);
  if (currentTopic === "nouns" || currentTopic === "all") pool = pool.concat(topic3);
  if (currentTopic === "prepositions" || currentTopic === "all") pool = pool.concat(topic4);
  if (currentTopic === "wordorder" || currentTopic === "all") pool = pool.concat(topic5);
  questions = shuffle(pool);
  qIndex = 0;
}

function showQuestion() {
  if (questions.length === 0) return;
  if (qIndex >= questions.length) {
    questions = shuffle(questions);
    qIndex = 0;
  }
  answered = false;
  const q = questions[qIndex];
  const card = document.getElementById("quizCard");
  card.classList.remove("flash-correct", "flash-wrong");
  document.getElementById("qType").textContent = q.type;
  document.getElementById("qSentence").innerHTML = formatSentence(q.sentence);
  document.getElementById("qHint").textContent = q.hint || "";
  const answersEl = document.getElementById("answers");
  answersEl.innerHTML = q.options.map((opt, i) =>
    `<button class="ans-btn" data-idx="${i}"><span class="key-hint">${i + 1}</span>${opt}</button>`
  ).join("");
  answersEl.querySelectorAll(".ans-btn").forEach(btn => {
    btn.addEventListener("click", () => selectAnswer(btn, q));
  });
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("continueBtn").classList.remove("show");
  updateProgress();
  updateScoreDisplay();
}

function formatSentence(s) {
  return s.replace(/\[([^\]]+)\]/g, '<span class="q-blank">$1</span>')
          .replace(/___/g, '<span class="q-blank">???</span>');
}

function selectAnswer(btn, q) {
  if (answered) return;
  answered = true;
  const selected = q.options[parseInt(btn.dataset.idx)];
  const isCorrect = selected === q.correct;
  const card = document.getElementById("quizCard");
  document.getElementById("answers").querySelectorAll(".ans-btn").forEach(b => {
    b.classList.add("disabled");
    if (q.options[parseInt(b.dataset.idx)] === q.correct) b.classList.add("correct");
  });
  if (isCorrect) {
    btn.classList.add("correct");
    card.classList.add("flash-correct");
    score.correct++;
    score.streak++;
    if (score.streak > score.maxStreak) score.maxStreak = score.streak;
    showFeedback(true, q.explanation);
  } else {
    btn.classList.add("wrong");
    card.classList.add("flash-wrong");
    score.streak = 0;
    showFeedback(false, q.explanation);
  }
  score.total++;
  saveScore();
  updateScoreDisplay();
  document.getElementById("continueBtn").classList.add("show");
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "correct-fb" : "wrong-fb");
  fb.innerHTML = `<strong>${correct ? "Richtig! ✓" : "Falsch ✗"}</strong><span class="explanation">${explanation}</span>`;
}

function nextQuestion() { qIndex++; showQuestion(); }

function updateScoreDisplay() {
  document.getElementById("streak").textContent = score.streak;
  document.getElementById("correctCount").textContent = score.correct;
  document.getElementById("totalCount").textContent = score.total;
  const pct = score.total > 0 ? Math.round(score.correct / score.total * 100) : 0;
  document.getElementById("pct").textContent = pct + "%";
}

function updateProgress() {
  const pct = questions.length > 0 ? Math.min(100, Math.round((qIndex / questions.length) * 100)) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
}

function resetScore() {
  score = { correct: 0, total: 0, streak: 0, maxStreak: 0 };
  saveScore();
  updateScoreDisplay();
  buildQuestions();
  showQuestion();
}

function saveScore() {
  try { localStorage.setItem("de-quiz-score", JSON.stringify(score)); } catch(e) {}
}

function loadScore() {
  try {
    const s = JSON.parse(localStorage.getItem("de-quiz-score"));
    if (s) score = { correct: s.correct || 0, total: s.total || 0, streak: s.streak || 0, maxStreak: s.maxStreak || 0 };
  } catch(e) {}
}

function handleKey(e) {
  if (answered) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); nextQuestion(); }
    return;
  }
  const keyMap = { "1": 0, "2": 1, "3": 2, "4": 3 };
  if (keyMap[e.key] !== undefined) {
    const btns = document.querySelectorAll("#answers .ans-btn");
    if (btns[keyMap[e.key]]) btns[keyMap[e.key]].click();
  }
  if (e.key === "Escape") {
    currentTopic = "all";
    renderTopics();
    buildQuestions();
    showQuestion();
  }
}

init();
</script>
</body>
</html>
