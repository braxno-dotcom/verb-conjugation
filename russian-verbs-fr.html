// БУДУ forms for imperfective future
const BUDU = ['буду','будешь','будет','будем','будете','будут'];
const PRONOUNS = ['я', 'ты', 'он/она', 'мы', 'вы', 'они'];
const PAST_LABELS = ['он (м.)', 'она (ж.)', 'оно (ср.)', 'мы/вы/они'];
const IMP_LABELS = ['(ты)', '(вы)'];

// ============================================================
// NORMALIZE FRENCH INPUT (strip accents for lookup)
// ============================================================
function normalizeFr(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

// ============================================================
// UI FUNCTIONS
// ============================================================
function tryVerb(v) {
  document.getElementById('verbInput').value = v;
  conjugate();
}

function conjugate() {
  var input = document.getElementById('verbInput').value.trim();
  var resultsDiv = document.getElementById('results');
  var verbInfoDiv = document.getElementById('verbInfo');
  var legendDiv = document.getElementById('legend');
  var warningBanner = document.getElementById('warningBanner');
  var aspectCard = document.getElementById('aspectCard');

  if (!input) {
    resultsDiv.innerHTML = '';
    verbInfoDiv.style.display = 'none';
    legendDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    aspectCard.style.display = 'none';
    return;
  }

  var verb = input.toLowerCase().trim();
  var frenchInput = null;

  // Check if input is French (Latin script)
  if (/[a-zA-Z\u00C0-\u024F]/.test(verb) && !/[а-яёА-ЯЁ]/.test(verb)) {
    var normalized = normalizeFr(verb);
    if (FR_TO_RU[normalized]) {
      frenchInput = verb;
      verb = FR_TO_RU[normalized];
    } else {
      // Try with accents preserved
      var found = false;
      for (var key in FR_TO_RU) {
        if (key === verb || normalizeFr(key) === normalized) {
          frenchInput = verb;
          verb = FR_TO_RU[key];
          found = true;
          break;
        }
      }
      if (!found) {
        resultsDiv.innerHTML = '<div class="no-result">Le verbe francais \"' + input + '\" n\'a pas ete trouve dans le dictionnaire.<br>Essayez un infinitif russe (par ex. : делать, говорить)</div>';
        verbInfoDiv.style.display = 'none';
        legendDiv.style.display = 'none';
        warningBanner.style.display = 'none';
        aspectCard.style.display = 'none';
        return;
      }
    }
  }

  var data = VERBS[verb];
  if (!data) {
    resultsDiv.innerHTML = '<div class="no-result">Le verbe \"' + input + '\" n\'a pas ete trouve.<br>Essayez : говорить, делать, идти, ou en francais : parler, faire, aller</div>';
    verbInfoDiv.style.display = 'none';
    legendDiv.style.display = 'none';
    warningBanner.style.display = 'none';
    aspectCard.style.display = 'none';
    return;
  }

  warningBanner.style.display = 'none';

  // Show aspect card
  var aspectLabel = data.aspect === 'impf' ? 'IMPERFECTIF (несовершенный вид)' : 'PERFECTIF (совершенный вид)';
  var aspectDesc = data.aspect === 'impf'
    ? 'action en cours, repetee ou habituelle — comme l\'imparfait francais'
    : 'action achevee, resultat obtenu — comme le passe compose francais';
  var pairInfo = '';
  if (data.pair && VERBS[data.pair]) {
    var pairAspect = data.aspect === 'impf' ? 'perfectif' : 'imperfectif';
    pairInfo = '<br>Son pair ' + pairAspect + ' : <span style="cursor:pointer;text-decoration:underline;font-weight:700;" onclick="tryVerb(\'' + data.pair + '\')">' + data.pair + '</span>';
  } else if (!data.pair) {
    pairInfo = '<br><i>Ce verbe n\'a pas de pair aspectuel courant.</i>';
  }
  aspectCard.innerHTML = '<b>Aspect :</b> Ce verbe est <b>' + aspectLabel + '</b> — ' + aspectDesc + '.' + pairInfo;
  aspectCard.style.display = 'block';

  // Show verb info badges
  verbInfoDiv.style.display = 'block';
  legendDiv.style.display = 'block';
  var infoHTML = '';
  if (frenchInput) {
    infoHTML += '<span class="badge" style="background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;">francais -> russe : ' + frenchInput + ' -> ' + verb + '</span>';
  }
  infoHTML += '<span class="badge badge-group">' + verb + '</span>';
  infoHTML += '<span class="badge badge-conj">' + data.conjugation + '</span>';
  infoHTML += '<span class="badge badge-aspect">' + (data.aspect === 'impf' ? 'Imperfectif (НСВ)' : 'Perfectif (СВ)') + '</span>';
  if (data.pair) {
    infoHTML += '<span class="badge badge-pair">Pair : ' + data.pair + '</span>';
  }
  verbInfoDiv.innerHTML = infoHTML;

  // Build tense cards
  var html = '';

  for (var t = 0; t < TENSES.length; t++) {
    var tense = TENSES[t];

    // Section labels
    if (t === 0) {
      html += '<div class="section-label">Temps courants</div>';
    }
    if (tense.literary && (t === 0 || !TENSES[t-1].literary)) {
      html += '<div class="section-label literary">Formes moins courantes (litteraire)</div>';
    }

    var headerClass = tense.literary ? 'literary' : 'active';
    var cardClass = tense.literary ? 'tense-card literary-card' : 'tense-card';

    html += '<div class="' + cardClass + '">';
    html += '<div class="tense-header ' + headerClass + '">';
    html += '<div class="ru-name">' + tense.ru + '</div>';
    html += '<div class="fr-name">' + tense.fr + '</div>';
    html += '</div>';
    html += '<div class="tense-explain">' + tense.explain + '</div>';
    html += '<div class="tense-body">';

    if (tense.id === 'present') {
      if (data.aspect === 'pf') {
        html += '<div style="color:#999;padding:8px 0;">Les verbes perfectifs n\'ont PAS de present.<br>Utilisez le pair imperfectif' + (data.pair ? ' <span style="cursor:pointer;text-decoration:underline;color:#7b2fa0;" onclick="tryVerb(\'' + data.pair + '\')">' + data.pair + '</span>' : '') + '.</div>';
      } else if (data.present) {
        html += '<table>';
        for (var i = 0; i < 6; i++) {
          html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + data.present[i] + '</td></tr>';
        }
        html += '</table>';
      } else if (verb === 'быть') {
        html += '<div style="color:#999;padding:8px 0;font-style:italic;">' + (data.note || 'Pas de forme au present.') + '</div>';
      } else {
        html += '<div style="color:#999;padding:8px 0;">Pas de forme au present.</div>';
      }
    }
    else if (tense.id === 'past') {
      if (data.past) {
        html += '<table>';
        for (var i = 0; i < 4; i++) {
          html += '<tr><td class="pronoun">' + PAST_LABELS[i] + '</td><td class="verb-form">' + data.past[i] + '</td></tr>';
        }
        html += '</table>';
      } else {
        html += '<div style="color:#999;padding:8px 0;">Pas de forme au passe.</div>';
      }
    }
    else if (tense.id === 'future') {
      if (data.aspect === 'impf') {
        // Imperfective future: буду + infinitive
        if (verb === 'быть') {
          // быть has its own future
          if (data.future) {
            html += '<table>';
            for (var i = 0; i < 6; i++) {
              html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + data.future[i] + '</td></tr>';
            }
            html += '</table>';
          }
        } else {
          html += '<table>';
          for (var i = 0; i < 6; i++) {
            html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + BUDU[i] + ' ' + verb + '</td></tr>';
          }
          html += '</table>';
          html += '<div style="font-size:0.85em;color:#888;padding-top:6px;font-style:italic;">Futur imperfectif = буду + infinitif</div>';
        }
      } else {
        // Perfective future: conjugated forms
        if (data.future) {
          html += '<table>';
          for (var i = 0; i < 6; i++) {
            html += '<tr><td class="pronoun">' + PRONOUNS[i] + '</td><td class="verb-form">' + data.future[i] + '</td></tr>';
          }
          html += '</table>';
          html += '<div style="font-size:0.85em;color:#888;padding-top:6px;font-style:italic;">Futur perfectif = conjugaison directe (comme le present en francais)</div>';
        } else {
          html += '<div style="color:#999;padding:8px 0;">Pas de forme au futur.</div>';
        }
      }
    }
    else if (tense.id === 'imperative') {
      if (data.imperative && data.imperative[0] !== '—') {
        html += '<table>';
        for (var i = 0; i < 2; i++) {
          html += '<tr><td class="pronoun">' + IMP_LABELS[i] + '</td><td class="verb-form">' + data.imperative[i] + '</td></tr>';
        }
        html += '</table>';
      } else {
        html += '<div style="color:#999;padding:8px 0;">Pas d\'imperatif pour ce verbe.</div>';
      }
    }
    else if (tense.id === 'conditional') {
      if (data.past) {
        html += '<table>';
        html += '<tr><td class="pronoun">он (м.)</td><td class="verb-form">' + data.past[0] + ' бы</td></tr>';
        html += '<tr><td class="pronoun">она (ж.)</td><td class="verb-form">' + data.past[1] + ' бы</td></tr>';
        html += '<tr><td class="pronoun">оно (ср.)</td><td class="verb-form">' + data.past[2] + ' бы</td></tr>';
        html += '<tr><td class="pronoun">мы/вы/они</td><td class="verb-form">' + data.past[3] + ' бы</td></tr>';
        html += '</table>';
        html += '<div style="font-size:0.85em;color:#888;padding-top:6px;font-style:italic;">Conditionnel = passe + бы (place libre)</div>';
      } else {
        html += '<div style="color:#999;padding:8px 0;">Pas de conditionnel.</div>';
      }
    }
    else if (tense.id === 'participle') {
      if (data.participles) {
        html += '<table>';
        var pLabels = ['Present actif', 'Passe actif', 'Passe passif'];
        for (var i = 0; i < 3; i++) {
          html += '<tr><td class="pronoun" style="width:120px;">' + pLabels[i] + '</td><td class="verb-form">' + data.participles[i] + '</td></tr>';
        }
        html += '</table>';
      } else {
        html += '<div style="color:#999;padding:8px 0;">—</div>';
      }
    }
    else if (tense.id === 'gerund') {
      if (data.gerunds) {
        html += '<table>';
        var gLabels = ['Present (impf)', 'Passe (pf)'];
        for (var i = 0; i < 2; i++) {
          html += '<tr><td class="pronoun" style="width:120px;">' + gLabels[i] + '</td><td class="verb-form">' + data.gerunds[i] + '</td></tr>';
        }
        html += '</table>';
      } else {
        html += '<div style="color:#999;padding:8px 0;">—</div>';
      }
    }

    html += '</div></div>';
  }

  resultsDiv.innerHTML = html;
}

// Auto-conjugate if there's a hash
if (location.hash) {
  document.getElementById('verbInput').value = decodeURIComponent(location.hash.slice(1));
